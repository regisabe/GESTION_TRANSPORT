<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1E3D"/>
      <stop offset="100%" style="stop-color:#07121F"/>
    </linearGradient>
    <linearGradient id="busGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5B845"/>
      <stop offset="100%" style="stop-color:#E8A020"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="92" ry="92"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="92" ry="92" fill="url(#bg)"/>

  <!-- Gold top accent bar -->
  <rect x="0" y="0" width="512" height="28" rx="0" fill="#E8A020" clip-path="url(#rounded)"/>
  <rect x="0" y="0" width="512" height="92" rx="92" fill="#E8A020" clip-path="url(#rounded)"/>
  <rect x="0" y="28" width="512" height="64" fill="url(#bg)" clip-path="url(#rounded)"/>

  <!-- Road / ground line -->
  <rect x="40" y="348" width="432" height="6" rx="3" fill="#243B55"/>

  <!-- Bus body -->
  <rect x="56" y="160" width="400" height="188" rx="28" fill="url(#busGrad)"/>

  <!-- Bus front accent (windshield dark zone) -->
  <rect x="56" y="160" width="82" height="188" rx="0" fill="#D4911A" clip-path="url(#busBody)"/>
  <rect x="62" y="160" width="82" height="188" rx="0" fill="#D4911A"/>
  <!-- Actually just make front panel slightly different -->
  <rect x="56" y="160" width="72" height="188" rx="28" fill="#CF8C18"/>
  <rect x="92" y="160" width="36" height="188" fill="#CF8C18"/>

  <!-- Windshield -->
  <rect x="68" y="178" width="50" height="80" rx="8" fill="#132848" opacity="0.9"/>

  <!-- Side windows row -->
  <rect x="148" y="178" width="66" height="80" rx="8" fill="#0B1E3D" opacity="0.85"/>
  <rect x="228" y="178" width="66" height="80" rx="8" fill="#0B1E3D" opacity="0.85"/>
  <rect x="308" y="178" width="66" height="80" rx="8" fill="#0B1E3D" opacity="0.85"/>
  <rect x="388" y="178" width="52" height="80" rx="8" fill="#0B1E3D" opacity="0.85"/>

  <!-- Window reflection highlight -->
  <rect x="150" y="180" width="20" height="12" rx="4" fill="#1A3357" opacity="0.6"/>
  <rect x="230" y="180" width="20" height="12" rx="4" fill="#1A3357" opacity="0.6"/>
  <rect x="310" y="180" width="20" height="12" rx="4" fill="#1A3357" opacity="0.6"/>

  <!-- Door line -->
  <rect x="142" y="274" width="4" height="74" rx="2" fill="#CF8C18"/>

  <!-- Undercarriage -->
  <rect x="72" y="338" width="370" height="18" rx="4" fill="#CF8C18" opacity="0.5"/>

  <!-- Left wheel -->
  <circle cx="148" cy="352" r="44" fill="#1A3357"/>
  <circle cx="148" cy="352" r="34" fill="#243B55"/>
  <circle cx="148" cy="352" r="16" fill="#E8A020"/>
  <circle cx="148" cy="352" r="8" fill="#F5B845"/>
  <!-- Wheel bolts -->
  <circle cx="148" cy="336" r="3.5" fill="#E8A020"/>
  <circle cx="148" cy="368" r="3.5" fill="#E8A020"/>
  <circle cx="132" cy="352" r="3.5" fill="#E8A020"/>
  <circle cx="164" cy="352" r="3.5" fill="#E8A020"/>

  <!-- Right wheel -->
  <circle cx="366" cy="352" r="44" fill="#1A3357"/>
  <circle cx="366" cy="352" r="34" fill="#243B55"/>
  <circle cx="366" cy="352" r="16" fill="#E8A020"/>
  <circle cx="366" cy="352" r="8" fill="#F5B845"/>
  <!-- Wheel bolts -->
  <circle cx="366" cy="336" r="3.5" fill="#E8A020"/>
  <circle cx="366" cy="368" r="3.5" fill="#E8A020"/>
  <circle cx="350" cy="352" r="3.5" fill="#E8A020"/>
  <circle cx="382" cy="352" r="3.5" fill="#E8A020"/>

  <!-- Exhaust pipe -->
  <rect x="430" y="328" width="26" height="8" rx="4" fill="#243B55"/>

  <!-- Headlight (front) -->
  <rect x="62" y="278" width="36" height="18" rx="6" fill="#F5D78E" opacity="0.9"/>
  <rect x="64" y="280" width="32" height="14" rx="4" fill="#FFF5D0"/>

  <!-- TP wordmark at bottom -->
  <text x="256" y="468" font-family="'Inter', 'SF Pro', -apple-system, Arial, sans-serif" font-size="54" font-weight="900" fill="#E8A020" text-anchor="middle" letter-spacing="6">TRANSITPRO</text>
  <text x="256" y="468" font-family="'Inter', 'SF Pro', -apple-system, Arial, sans-serif" font-size="54" font-weight="900" fill="#94A3B8" text-anchor="middle" letter-spacing="6">TRANSITPRO</text>

  <!-- Subtle bottom glow -->
  <ellipse cx="256" cy="420" rx="180" ry="20" fill="#E8A020" opacity="0.06"/>
</svg>
