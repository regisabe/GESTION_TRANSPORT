function QRPlaceholder({ value, size = 70 }) {
  const hash = value.split("").reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0);
  const cells = 11; const cell = size / cells; const grid = [];
  for (let r = 0; r < cells; r++)
    for (let c2 = 0; c2 < cells; c2++) {
      const isCorner = (r < 3 && c2 < 3) || (r < 3 && c2 > cells - 4) || (r > cells - 4 && c2 < 3);
      const rand = ((hash * (r * 13 + c2 * 7 + 3)) & 0xFF) > 120;
      if (isCorner || rand) grid.push({ r, c: c2 });
    }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block" }}>
      <rect width={size} height={size} fill="white" />
      {grid.map((g, i) => <rect key={i} x={g.c * cell} y={g.r * cell} width={cell - 0.5} height={cell - 0.5} fill="#000" />)}
    </svg>
  );
}

function Toast({ msg, type = "success" }) {
  if (!msg) return null;
  const bg = type === "error" ? "#B91C1C" : type === "warn" ? "#C2410C" : "#15803D";
  return (
    <div style={{ position: "fixed", top: 72, left: "50%", transform: "translateX(-50%)", background: bg, color: "#fff", padding: "10px 22px", borderRadius: 12, fontSize: 13, fontWeight: 700, zIndex: 500, whiteSpace: "nowrap", boxShadow: "0 4px 24px #0009" }}>
      {msg}
    </div>
  );
}

function useToast() {
  const [toast, setToast] = useState({ msg: "", type: "success" });
  const show = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast({ msg: "" }), 2800); };
  return [toast, show];
}

// CLOUD SYNC — JSONBin.io
// ═══════════════════════════════════════════════════════════
const JSONBIN_API = "https://api.jsonbin.io/v3";

function getJsonbinKey() {
  return localStorage.getItem("transitpro_jsonbin_key") || "";
}
function setJsonbinKey(key) {
  localStorage.setItem("transitpro_jsonbin_key", key.trim());
}

async function cloudCreate(data) {
  const key = getJsonbinKey();
  if (!key) throw new Error("Aucune clé API configurée. Allez dans Configuration > Synchronisation.");
  const r = await fetch(`${JSONBIN_API}/b`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Master-Key": key, "X-Bin-Private": "false" },
    body: JSON.stringify(data),
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) {
    throw new Error(j.message || `Erreur ${r.status}`);
  }
  return j.metadata?.id || null;
}

async function cloudRead(binId) {
  const key = getJsonbinKey();
  if (!key) throw new Error("Aucune clé API configurée. Allez dans Configuration > Synchronisation.");
  const r = await fetch(`${JSONBIN_API}/b/${binId}/latest`, {
    headers: { "X-Master-Key": key },
  });
  if (!r.ok) {
    const j = await r.json().catch(() => ({}));
    throw new Error(j.message || `Erreur ${r.status}`);
  }
  const j = await r.json();
  return j.record || null;
}

async function cloudWrite(binId, data) {
  const key = getJsonbinKey();
  if (!key) return false;
  const r = await fetch(`${JSONBIN_API}/b/${binId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": key },
    body: JSON.stringify(data),
  });
  return r.ok;
}

      colisCounter: 1,
    };

    // Si aucune clé API n'est configurée, créer en local uniquement
    if (!getJsonbinKey()) {
      localStorage.setItem("transitpro_bin", JSON.stringify({ id: null, nom: nom.trim() }));
      localStorage.setItem("transitpro_db_backup", JSON.stringify(newDB));
      onReady(newDB, null, true);
      return;
    }

    try {
      const id = await cloudCreate(newDB);
      localStorage.setItem("transitpro_bin", JSON.stringify({ id, nom: nom.trim() }));
      onReady(newDB, id, true);
    } catch(e) {
      // Échec cloud → repli en local pour ne pas bloquer la création
      localStorage.setItem("transitpro_bin", JSON.stringify({ id: null, nom: nom.trim() }));
      localStorage.setItem("transitpro_db_backup", JSON.stringify(newDB));
      onReady(newDB, null, true);
    }
  };

  const handleConnecter = async () => {
    setErr("");
    const id = binId.trim();
    if (!id) { setErr("Entrez votre ID de compagnie"); return; }
    setLoading(true);
    try {
      const data = await cloudRead(id);
      if (!data || !data.compagnie) { setErr("ID introuvable. Vérifiez l'ID."); setLoading(false); return; }
      localStorage.setItem("transitpro_bin", JSON.stringify({ id, nom: data.compagnie.nom }));
      onReady(data, id);
    } catch(e) { setErr("Erreur réseau : " + e.message); setLoading(false); }
  };

  const handleSync = async () => {
    setErr("");
    const id = binId.trim();
    if (!id) { setErr("Entrez votre ID de compagnie"); return; }
    setLoading(true);
    try {
      const data = await cloudRead(id);
      if (!data || !data.compagnie) { setErr("ID introuvable ou données corrompues."); setLoading(false); return; }
      localStorage.setItem("transitpro_bin", JSON.stringify({ id, nom: data.compagnie.nom }));
      onReady(data, id);
    } catch(e) { setErr("Erreur réseau : " + e.message); setLoading(false); }
  };

  const btnStyle = (col, outline) => ({
    width: "100%", padding: "13px", borderRadius: 12, border: outline ? `2px solid ${col}` : "none",
    background: outline ? "transparent" : col, color: outline ? col : "#fff",
    fontSize: 14, fontWeight: 800, cursor: "pointer", marginBottom: 10,
  });

  // ── HOME ──
  if (mode === "home") {
    const saved = (() => { try { return JSON.parse(localStorage.getItem("transitpro_bin")); } catch { return null; } })();
    return (
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: T.bg, padding: 24, position: "relative" }}>
        <button onClick={toggleTheme} style={{ position: "absolute", top: 18, right: 18, background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, padding: "6px 12px", fontSize: 16, cursor: "pointer" }}>{isDark ? "☀️" : "🌙"}</button>
        <div style={{ fontSize: 10, color: T.textMuted, position: "absolute", top: 22, left: 18, fontWeight: 600 }}>{tick}</div>
        <div style={{ fontSize: 64, marginBottom: 10 }}>🚌</div>
        <div style={{ fontSize: 26, fontWeight: 900, color: T.gold, letterSpacing: 1 }}>TransitPro</div>
        <div style={{ fontSize: 13, color: T.textSub, marginBottom: 36 }}>Gestion de transport intelligente</div>

        {saved && (
          <div style={{ background: T.surface, border: `1px solid ${T.gold}44`, borderRadius: 14, padding: "14px 18px", width: "100%", maxWidth: 320, marginBottom: 18, textAlign: "center" }}>
            <div style={{ fontSize: 10, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Dernière session</div>
            <div style={{ fontSize: 15, fontWeight: 800, color: T.text, marginBottom: 2 }}>{saved.nom}</div>
            {saved.id ? (
              <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 12, fontFamily: "monospace" }}>ID: {saved.id}</div>
            ) : (
              <div style={{ fontSize: 10, color: T.blue, marginBottom: 12 }}>📱 Session locale (sync non activée)</div>
            )}
            <button onClick={() => {
              if (saved.id) {
                // Compagnie liée au cloud → recharge via l'ID
                setBinId(saved.id); setMode("connecter");
              } else {
                // Compagnie locale uniquement → on recharge directement le backup local
                const backup = localStorage.getItem("transitpro_db_backup");
                if (backup) {
                  try {
                    const data = JSON.parse(backup);
                    onReady(data, null, false);
                    return;
                  } catch {}
                }
                setErr("Aucune donnée locale trouvée. Créez une nouvelle compagnie.");
              }
            }} style={btnStyle(T.gold, false)}>
              🔓 Reprendre cette session
            </button>
          </div>
        )}

        <div style={{ width: "100%", maxWidth: 320 }}>
          <button onClick={() => setMode("creer")} style={btnStyle(T.gold, false)}>🏢 Créer ma compagnie</button>
          <button onClick={() => setMode("connecter")} style={btnStyle(T.gold, true)}>🔑 Se connecter (ID existant)</button>
          <button onClick={() => setMode("sync")} style={{ ...btnStyle(T.blue, true), marginBottom: 0 }}>☁️ Récupérer / Synchroniser</button>
        </div>

        <div style={{ marginTop: 28, fontSize: 10, color: T.textMuted, textAlign: "center", maxWidth: 280 }}>
          Vos données sont stockées dans le cloud JSONBin.io. Gardez votre ID en lieu sûr.
        </div>
      </div>
    );
  }

  // ── CRÉER ──
  if (mode === "creer") {
    return (
      <div style={{ minHeight: "100vh", background: T.bg, padding: 24, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div style={{ width: "100%", maxWidth: 340 }}>
          <button onClick={() => setMode("home")} style={{ background: "none", border: "none", color: T.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", marginBottom: 18 }}>← Retour</button>
          <div style={{ fontSize: 20, fontWeight: 900, color: T.gold, marginBottom: 4 }}>🏢 Nouvelle compagnie</div>
          <div style={{ fontSize: 12, color: T.textSub, marginBottom: 20 }}>Créez votre espace de gestion cloud</div>

          <div style={{ background: T.surface, borderRadius: 16, padding: 20, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Infos compagnie</div>
            {inp(nom, setNom, "Nom de la compagnie *")}
            {inp(ville, setVille, "Ville (ex: Abidjan)")}
            {inp(pays, setPays, "Pays")}
            <div style={{ height: 1, background: T.border, margin: "12px 0" }} />
            <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Codes PIN (4 chiffres)</div>
            {inp(adminPin, setAdminPin, "PIN Administrateur *", "number")}
            {inp(caissierPin, setCaissierPin, "PIN Caissier *", "number")}
            {err && <div style={{ color: T.red, fontSize: 12, fontWeight: 700, marginBottom: 10, padding: "8px 12px", background: `${T.red}18`, borderRadius: 8 }}>⚠️ {err}</div>}
            <button onClick={handleCreer} disabled={loading} style={btnStyle(T.gold, false)}>
              {loading ? "⏳ Création en cours..." : "✅ Créer ma compagnie"}
            </button>
          </div>
          <div style={{ marginTop: 14, fontSize: 10, color: T.textMuted, textAlign: "center" }}>
            Un ID unique sera généré et affiché après création. Notez-le !
          </div>
        </div>
      </div>
    );
  }

  // ── CONNECTER ──
  if (mode === "connecter") {
    return (
      <div style={{ minHeight: "100vh", background: T.bg, padding: 24, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div style={{ width: "100%", maxWidth: 340 }}>
          <button onClick={() => setMode("home")} style={{ background: "none", border: "none", color: T.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", marginBottom: 18 }}>← Retour</button>
          <div style={{ fontSize: 20, fontWeight: 900, color: T.gold, marginBottom: 4 }}>🔑 Se connecter</div>
          <div style={{ fontSize: 12, color: T.textSub, marginBottom: 20 }}>Entrez l'ID de votre compagnie</div>

          <div style={{ background: T.surface, borderRadius: 16, padding: 20, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>ID de compagnie</div>
            <input value={binId} onChange={e => setBinId(e.target.value)} placeholder="ex: 6867a1b48960c979a5967xxx"
              style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 9, padding: "11px 14px", color: T.text, fontSize: 13, outline: "none", boxSizing: "border-box", marginBottom: 10, fontFamily: "monospace" }} />
            {err && <div style={{ color: T.red, fontSize: 12, fontWeight: 700, marginBottom: 10, padding: "8px 12px", background: `${T.red}18`, borderRadius: 8 }}>⚠️ {err}</div>}
            <button onClick={handleConnecter} disabled={loading} style={btnStyle(T.gold, false)}>
              {loading ? "⏳ Chargement..." : "🔓 Charger mes données"}
            </button>
          </div>
          <div style={{ marginTop: 14, fontSize: 10, color: T.textMuted, textAlign: "center" }}>
            L'ID vous a été fourni lors de la création de votre compagnie.
          </div>
        </div>
      </div>
    );
  }

  // ── SYNC ──
  if (mode === "sync") {
    return (
      <div style={{ minHeight: "100vh", background: T.bg, padding: 24, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div style={{ width: "100%", maxWidth: 340 }}>
          <button onClick={() => setMode("home")} style={{ background: "none", border: "none", color: T.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", marginBottom: 18 }}>← Retour</button>
          <div style={{ fontSize: 20, fontWeight: 900, color: T.blue, marginBottom: 4 }}>☁️ Récupérer / Synchroniser</div>
          <div style={{ fontSize: 12, color: T.textSub, marginBottom: 20 }}>Rechargez vos données depuis le cloud</div>

          <div style={{ background: T.surface, borderRadius: 16, padding: 20, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>ID de compagnie</div>
            <input value={binId} onChange={e => setBinId(e.target.value)} placeholder="ex: 6867a1b48960c979a5967xxx"
              style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 9, padding: "11px 14px", color: T.text, fontSize: 13, outline: "none", boxSizing: "border-box", marginBottom: 10, fontFamily: "monospace" }} />
            {err && <div style={{ color: T.red, fontSize: 12, fontWeight: 700, marginBottom: 10, padding: "8px 12px", background: `${T.red}18`, borderRadius: 8 }}>⚠️ {err}</div>}
            <button onClick={handleSync} disabled={loading} style={btnStyle(T.blue, false)}>
              {loading ? "⏳ Synchronisation..." : "☁️ Synchroniser depuis le cloud"}
            </button>
          </div>
          <div style={{ marginTop: 14, fontSize: 10, color: T.textMuted, textAlign: "center" }}>
            Cette action remplace les données locales par celles du cloud.
          </div>
        </div>
      </div>
    );
  }

  return null;
}

// ═══════════════════════════════════════════════════════════
// ÉCRAN LOGIN PIN — après sélection compagnie
// ═══════════════════════════════════════════════════════════
function LoginScreen({ db, onLogin, T, toggleTheme, isDark, onRetour, binId }) {
  const [pin, setPin] = useState("");
  const [login, setLogin] = useState("");
  const [err, setErr] = useState(false);
  const [tick, setTick] = useState("");
  const [showId, setShowId] = useState(false);
  const c = db.compagnie;

  useEffect(() => {
    const t = setInterval(() => setTick(new Date().toLocaleTimeString("fr-FR")), 1000);
    return () => clearInterval(t);
  }, []);

  const handlePin = (d) => {
    if (d === "DEL") { setPin(p => p.slice(0, -1)); return; }
    const next = pin + d;
    if (next.length > 4) return;
    setPin(next);
    if (next.length === 4) {
      const found = db.users.find(u => (!login || u.login === login) && u.pin === next);
      if (found) { onLogin(found); }
      else { setErr(true); setTimeout(() => { setPin(""); setErr(false); }, 1200); }
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: T.bg, padding: 24, position: "relative" }}>
      <button onClick={toggleTheme} style={{ position: "absolute", top: 18, right: 18, background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, padding: "6px 12px", fontSize: 16, cursor: "pointer" }}>{isDark ? "☀️" : "🌙"}</button>
      <button onClick={onRetour} style={{ position: "absolute", top: 18, left: 18, background: "none", border: "none", color: T.gold, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>← Changer</button>
      <div style={{ fontSize: 10, color: T.textMuted, position: "absolute", top: 52, left: 18, fontWeight: 600 }}>{tick}</div>
      <div style={{ fontSize: 52, marginBottom: 8 }}>{c.logo || "🚌"}</div>
      <div style={{ fontSize: 22, fontWeight: 900, color: T.gold }}>{c.nom}</div>
      <div style={{ fontSize: 12, color: T.textSub, marginBottom: 4 }}>{c.slogan}</div>
      <button onClick={() => setShowId(v => !v)} style={{ fontSize: 10, color: T.textMuted, background: "none", border: "none", cursor: "pointer", marginBottom: 20, textDecoration: "underline" }}>
        {showId ? binId : "Voir l'ID de la compagnie"}
      </button>
      <div style={{ background: T.surface, borderRadius: 18, padding: 22, width: "100%", maxWidth: 310, border: `1px solid ${T.border}` }}>
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 10, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Utilisateur (optionnel)</div>
          <input value={login} onChange={e => setLogin(e.target.value)} placeholder="admin / caissier"
            style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 8, padding: "8px 12px", color: T.text, fontSize: 13, outline: "none", boxSizing: "border-box" }} />
        </div>
        <div style={{ textAlign: "center", fontSize: 12, color: T.textSub, marginBottom: 14, fontWeight: 600 }}>Code PIN</div>
        <div style={{ display: "flex", justifyContent: "center", gap: 14, marginBottom: 16 }}>
          {[0, 1, 2, 3].map(i => <div key={i} style={{ width: 15, height: 15, borderRadius: "50%", background: err ? T.red : i < pin.length ? T.gold : T.border, transition: "all 0.15s" }} />)}
        </div>
        {err && <div style={{ textAlign: "center", color: T.red, fontSize: 12, fontWeight: 700, marginBottom: 8 }}>PIN incorrect</div>}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
          {["1","2","3","4","5","6","7","8","9","DEL","0","✓"].map(d => (
            <button key={d} onClick={() => d !== "✓" && handlePin(d)}
              style={{ padding: 13, borderRadius: 11, border: `1px solid ${T.border}`, background: d === "DEL" ? `${T.red}18` : d === "✓" ? `${T.green}18` : T.surfaceLL, color: d === "DEL" ? T.red : d === "✓" ? T.green : T.text, fontSize: 17, fontWeight: 800, cursor: "pointer" }}>
              {d}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MODAL ID AFFICHÉ APRÈS CRÉATION
// ═══════════════════════════════════════════════════════════
function IDModal({ binId, nomCompagnie, T, onClose }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(binId).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };
  const isLocalOnly = !binId;
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000D", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ background: T.surface, borderRadius: 20, padding: 28, width: "100%", maxWidth: 340, border: `2px solid ${isLocalOnly ? T.blue : T.gold}` }}>
        <div style={{ textAlign: "center", fontSize: 40, marginBottom: 8 }}>{isLocalOnly ? "📱" : "🎉"}</div>
        <div style={{ fontSize: 18, fontWeight: 900, color: isLocalOnly ? T.blue : T.gold, textAlign: "center", marginBottom: 4 }}>Compagnie créée !</div>
        <div style={{ fontSize: 13, color: T.textSub, textAlign: "center", marginBottom: 20 }}>{nomCompagnie}</div>

        {isLocalOnly ? (
          <div style={{ background: `${T.blue}15`, borderRadius: 10, padding: "12px 14px", marginBottom: 16, fontSize: 12, color: T.text, lineHeight: 1.5 }}>
            ☁️ La synchronisation cloud n'est pas encore activée. Vos données restent sur cet appareil pour l'instant.<br /><br />
            Pour activer la sync (et accéder depuis un autre appareil), allez dans <strong>Configuration → Synchronisation</strong> et ajoutez votre clé API.
          </div>
        ) : (
          <>
            <div style={{ background: T.surfaceL, borderRadius: 12, padding: 16, marginBottom: 16, textAlign: "center", border: `1px solid ${T.border}` }}>
              <div style={{ fontSize: 10, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>🔑 Votre ID unique</div>
              <div style={{ fontSize: 12, fontFamily: "monospace", color: T.gold, wordBreak: "break-all", fontWeight: 700, letterSpacing: 0.5 }}>{binId}</div>
            </div>
            <div style={{ background: `${T.red}15`, borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 11, color: T.red, fontWeight: 700 }}>
              ⚠️ Notez cet ID ! Il vous permettra de vous reconnecter depuis n'importe quel appareil.
            </div>
            <button onClick={copy} style={{ width: "100%", padding: 12, borderRadius: 10, background: copied ? T.green : T.gold, color: "#fff", border: "none", fontSize: 14, fontWeight: 800, cursor: "pointer", marginBottom: 10 }}>
              {copied ? "✅ Copié !" : "📋 Copier l'ID"}
            </button>
          </>
        )}
        <button onClick={onClose} style={{ width: "100%", padding: 12, borderRadius: 10, background: "transparent", color: T.textSub, border: `1px solid ${T.border}`, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
          Continuer vers l'application →
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// APP LOGIN
// ═══════════════════════════════════════════════════════════
function AppLogin() {
  const [isDark, setIsDark] = useState(() => {
    try { return localStorage.getItem("transitpro_theme") !== "light"; } catch { return true; }
  });
  const T = themes[isDark ? "dark" : "light"];
  const [db, setDB] = useState(null);
  const [binId, setBinId] = useState(null);
  const [showIDModal, setShowIDModal] = useState(false);

  const toggleTheme = () => {
    setIsDark(d => {
      const next = !d;
      try { localStorage.setItem("transitpro_theme", next ? "dark" : "light"); } catch {}
      return next;
    });
  };

  const handleReady = (data, id, isNew = false) => {
    setDB(data);
    setBinId(id);
    if (isNew) setShowIDModal(true);
  };

  const handleIDModalClose = () => setShowIDModal(false);

  const handleLogin = (user) => {
    try {
      const payload = JSON.stringify({ db, binId, userId: user.id, isDark });
      localStorage.setItem("transitpro_session", payload);
      // Vérifie que l'écriture a bien été persistée avant de rediriger
      const check = localStorage.getItem("transitpro_session");
      if (!check) throw new Error("Écriture non persistée");
    } catch (e) {
      console.error("Erreur sauvegarde session", e);
      const isQuota = e && (e.name === "QuotaExceededError" || /quota/i.test(e.message || ""));
      alert(isQuota
        ? "⚠️ Stockage local plein. Réduisez la taille du logo de votre compagnie (Configuration) ou libérez de l'espace dans votre navigateur, puis réessayez."
        : "⚠️ Impossible de sauvegarder la session localement. Vérifiez que le mode privé/incognito n'est pas activé, puis réessayez.");
      return; // ne redirige pas si la session n'a pas pu être sauvegardée
    }
    window.location.href = "index.html";
  };

  const handleRetour = () => { setDB(null); setBinId(null); };

  if (!db) return <OnboardingScreen T={T} isDark={isDark} toggleTheme={toggleTheme} onReady={handleReady} />;
  if (showIDModal) return <IDModal binId={binId} nomCompagnie={db.compagnie.nom} T={T} onClose={handleIDModalClose} />;
  return <LoginScreen db={db} binId={binId} onLogin={handleLogin} T={T} toggleTheme={toggleTheme} isDark={isDark} onRetour={handleRetour} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppLogin />);
