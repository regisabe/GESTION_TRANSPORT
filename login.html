function QRPlaceholder({ value, size = 70 }) {
  const hash = value.split("").reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0);
  const cells = 11; const cell = size / cells; const grid = [];
  for (let r = 0; r < cells; r++)
    for (let c2 = 0; c2 < cells; c2++) {
      const isCorner = (r < 3 && c2 < 3) || (r < 3 && c2 > cells - 4) || (r > cells - 4 && c2 < 3);
      const rand = ((hash * (r * 13 + c2 * 7 + 3)) & 0xFF) > 120;
      if (isCorner || rand) grid.push({ r, c: c2 });
    }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block" }}>
      <rect width={size} height={size} fill="white" />
      {grid.map((g, i) => <rect key={i} x={g.c * cell} y={g.r * cell} width={cell - 0.5} height={cell - 0.5} fill="#000" />)}
    </svg>
  );
}

function Toast({ msg, type = "success" }) {
  if (!msg) return null;
  const bg = type === "error" ? "#B91C1C" : type === "warn" ? "#C2410C" : "#15803D";
  return (
    <div style={{ position: "fixed", top: 72, left: "50%", transform: "translateX(-50%)", background: bg, color: "#fff", padding: "10px 22px", borderRadius: 12, fontSize: 13, fontWeight: 700, zIndex: 500, whiteSpace: "nowrap", boxShadow: "0 4px 24px #0009" }}>
      {msg}
    </div>
  );
}

function useToast() {
  const [toast, setToast] = useState({ msg: "", type: "success" });
  const show = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast({ msg: "" }), 2800); };
  return [toast, show];
}

function useViewport() {
  const [vp, setVp] = useState(() => ({ width: window.innerWidth, height: window.innerHeight }));
  useEffect(() => {
    const onResize = () => setVp({ width: window.innerWidth, height: window.innerHeight });
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return vp;
}

function useOnlineStatus() {
  const [online, setOnline] = useState(() => typeof navigator === "undefined" ? true : navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);
  return online;
}

// ═══════════════════════════════════════════════════════════
// CLOUD SYNC — JSONBin.io
// ═══════════════════════════════════════════════════════════
const JSONBIN_API = "https://api.jsonbin.io/v3";

function getJsonbinKey() {
  return localStorage.getItem("transitpro_jsonbin_key") || "";
}
function setJsonbinKey(key) {
  localStorage.setItem("transitpro_jsonbin_key", key.trim());
}

async function cloudCreate(data) {
  const key = getJsonbinKey();
  if (!key) throw new Error("Aucune clé API configurée. Allez dans Configuration > Synchronisation.");
  const r = await fetch(`${JSONBIN_API}/b`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Master-Key": key, "X-Bin-Private": "false" },
    body: JSON.stringify(data),
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) {
    throw new Error(j.message || `Erreur ${r.status}`);
  }
  return j.metadata?.id || null;
}

async function cloudRead(binId) {
  const key = getJsonbinKey();
  if (!key) throw new Error("Aucune clé API configurée. Allez dans Configuration > Synchronisation.");
  const r = await fetch(`${JSONBIN_API}/b/${binId}/latest`, {
    headers: { "X-Master-Key": key },
  });
  if (!r.ok) {
    const j = await r.json().catch(() => ({}));
    throw new Error(j.message || `Erreur ${r.status}`);
  }
  const j = await r.json();
  return j.record || null;
}

async function cloudWrite(binId, data) {
  const key = getJsonbinKey();
  if (!key) return false;
  const r = await fetch(`${JSONBIN_API}/b/${binId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": key },
    body: JSON.stringify(data),
  });
  return r.ok;
}

// ── Espaces (multi-compagnies sur un même appareil) ──
const SPACES_KEY = "transitpro_spaces";

function getSpaces() {
  try {
    const list = JSON.parse(localStorage.getItem(SPACES_KEY)) || [];
    if (list.length) return list;
  } catch {}
  // Migration depuis l'ancien format mono-compagnie
  try {
    const legacy = JSON.parse(localStorage.getItem("transitpro_bin"));
    if (legacy && legacy.nom) return [{ ...legacy, addedAt: Date.now() }];
  } catch {}
  return [];
}

function saveSpace(space) {
  const list = getSpaces().filter(s => space.id ? s.id !== space.id : s.nom !== space.nom);
  list.unshift({ id: space.id || null, nom: space.nom, logo: space.logo || "🚌", logoUrl: space.logoUrl || "", addedAt: Date.now() });
  const trimmed = list.slice(0, 8);
  localStorage.setItem(SPACES_KEY, JSON.stringify(trimmed));
  localStorage.setItem("transitpro_bin", JSON.stringify({ id: space.id || null, nom: space.nom }));
}

function removeSpace(space) {
  const list = getSpaces().filter(s => !(s.id === space.id && s.nom === space.nom));
  localStorage.setItem(SPACES_KEY, JSON.stringify(list));
  if (!space.id) localStorage.removeItem(localBackupKey(space.nom));
}

function localBackupKey(nom) {
  return "transitpro_db_backup__" + (nom || "").trim().toLowerCase().replace(/[^a-z0-9]+/g, "-");
}

// ═══════════════════════════════════════════════════════════
// ÉCRAN ONBOARDING — Créer / Connecter / Récupérer
// ═══════════════════════════════════════════════════════════
function OnboardingScreen({ T, toggleTheme, isDark, onReady }) {
  const [mode, setMode] = useState("home"); // home | creer | connecter | sync
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const [tick, setTick] = useState("");
  const vp = useViewport();
  const desktop = vp.width >= 640;
  const online = useOnlineStatus();
  const [spaces, setSpaces] = useState(() => getSpaces());
  const [confirmDel, setConfirmDel] = useState(null);
  const [activeId, setActiveId] = useState(null);

  // Créer
  const [nom, setNom] = useState("");
  const [ville, setVille] = useState("");
  const [pays, setPays] = useState(defaultDB.compagnie.pays);
  const [adminPin, setAdminPin] = useState("");
  const [caissierPin, setCaissierPin] = useState("");

  // Connecter / Sync
  const [binId, setBinId] = useState("");
  const [apiKey, setApiKey] = useState(() => getJsonbinKey());
  const [showKey, setShowKey] = useState(false);

  useEffect(() => {
    const t = setInterval(() => setTick(new Date().toLocaleTimeString("fr-FR")), 1000);
    // Vérifier si une session locale existe déjà
    const saved = localStorage.getItem("transitpro_bin");
    if (saved) {
      const { id } = JSON.parse(saved);
      if (id) setBinId(id);
    }
    return () => clearInterval(t);
  }, []);

  const inp = (val, set, ph, type = "text") => {
    if (type === "pin") {
      return (
        <input
          value={val}
          onChange={e => set(e.target.value.replace(/\D/g, "").slice(0, 4))}
          placeholder={ph}
          type="tel"
          inputMode="numeric"
          pattern="[0-9]*"
          maxLength={4}
          style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 9, padding: "11px 14px", color: T.text, fontSize: 14, outline: "none", boxSizing: "border-box", marginBottom: 10, letterSpacing: 4, fontFamily: "monospace" }} />
      );
    }
    return (
      <input value={val} onChange={e => set(e.target.value)} placeholder={ph} type={type}
        style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 9, padding: "11px 14px", color: T.text, fontSize: 14, outline: "none", boxSizing: "border-box", marginBottom: 10 }} />
    );
  };

  const handleCreer = async () => {
    setErr("");
    if (!nom.trim()) { setErr("Entrez le nom de la compagnie"); return; }
    if (adminPin.length < 4) { setErr("PIN admin : 4 chiffres requis"); return; }
    if (caissierPin.length < 4) { setErr("PIN caissier : 4 chiffres requis"); return; }
    setLoading(true);
    const newDB = {
      ...defaultDB,
      compagnie: { ...defaultDB.compagnie, nom: nom.trim(), ville: ville.trim() || defaultDB.compagnie.ville, pays: pays.trim() || defaultDB.compagnie.pays, slogan: "Votre mobilité, notre mission", tel: "", email: "", adresse: "", logo: "🚌", logoUrl: "", couleurPrimaire: "#E8A020", couleurSecondaire: "#243B55", devise: "FCFA" },
      users: [
        { id: "U001", nom: "Admin", login: "admin", pin: adminPin, role: "admin", modules: ["dashboard","caisse","vente","bagages","colis","planning","recettes","rapports","config"] },
        { id: "U002", nom: "Caissier", login: "caissier", pin: caissierPin, role: "caissier", modules: ["caisse","vente","bagages","colis","planning"] },
      ],
      routes: [],
      vehicules: [],
      ventes: [],
      planning: [],
      sessions: [],
      bagages: [],
      colis: [],
      ticketCounter: 1,
      bagageCounter: 1,
      colisCounter: 1,
    };

    // Si aucune clé API n'est configurée, créer en local uniquement
    if (!getJsonbinKey()) {
      saveSpace({ id: null, nom: nom.trim(), logo: newDB.compagnie.logo, logoUrl: newDB.compagnie.logoUrl });
      localStorage.setItem(localBackupKey(nom), JSON.stringify(newDB));
      onReady(newDB, null, true);
      return;
    }

    if (!online) {
      saveSpace({ id: null, nom: nom.trim(), logo: newDB.compagnie.logo, logoUrl: newDB.compagnie.logoUrl });
      localStorage.setItem(localBackupKey(nom), JSON.stringify(newDB));
      setErr("Créée en local (pas de connexion). La synchronisation cloud se fera plus tard.");
      onReady(newDB, null, true);
      return;
    }

    try {
      const id = await cloudCreate(newDB);
      saveSpace({ id, nom: nom.trim(), logo: newDB.compagnie.logo, logoUrl: newDB.compagnie.logoUrl });
      onReady(newDB, id, true);
    } catch(e) {
      // Échec cloud → repli en local pour ne pas bloquer la création
      saveSpace({ id: null, nom: nom.trim(), logo: newDB.compagnie.logo, logoUrl: newDB.compagnie.logoUrl });
      localStorage.setItem(localBackupKey(nom), JSON.stringify(newDB));
      onReady(newDB, null, true);
    }
  };

  const handleConnecter = async () => {
    setErr("");
    const id = binId.trim();
    if (!id) { setErr("Entrez votre ID de compagnie"); return; }
    if (apiKey.trim()) setJsonbinKey(apiKey);
    if (!getJsonbinKey()) { setErr("Entrez votre clé API JSONBin (X-Master-Key) — nécessaire pour récupérer vos données sur ce nouvel appareil."); return; }
    if (!online) { setErr("📡 Pas de connexion internet. Vérifiez votre réseau et réessayez."); return; }
    setLoading(true);
    try {
      const data = await cloudRead(id);
      if (!data || !data.compagnie) { setErr("ID introuvable. Vérifiez l'ID."); setLoading(false); return; }
      saveSpace({ id, nom: data.compagnie.nom, logo: data.compagnie.logo, logoUrl: data.compagnie.logoUrl });
      onReady(data, id);
    } catch(e) { setErr("Erreur : " + e.message); setLoading(false); }
  };

  const handleSync = async () => {
    setErr("");
    const id = binId.trim();
    if (!id) { setErr("Entrez votre ID de compagnie"); return; }
    if (apiKey.trim()) setJsonbinKey(apiKey);
    if (!getJsonbinKey()) { setErr("Entrez votre clé API JSONBin (X-Master-Key) — nécessaire pour récupérer vos données sur ce nouvel appareil."); return; }
    if (!online) { setErr("📡 Pas de connexion internet. Vérifiez votre réseau et réessayez."); return; }
    setLoading(true);
    try {
      const data = await cloudRead(id);
      if (!data || !data.compagnie) { setErr("ID introuvable ou données corrompues."); setLoading(false); return; }
      saveSpace({ id, nom: data.compagnie.nom, logo: data.compagnie.logo, logoUrl: data.compagnie.logoUrl });
      onReady(data, id);
    } catch(e) { setErr("Erreur : " + e.message); setLoading(false); }
  };

  const btnStyle = (col, outline) => ({
    width: "100%", padding: "13px", borderRadius: 12, border: outline ? `2px solid ${col}` : "none",
    background: outline ? "transparent" : col, color: outline ? col : "#fff",
    fontSize: 14, fontWeight: 800, cursor: "pointer", marginBottom: 10,
  });

  // ── HOME ──
  if (mode === "home") {
    const resumeSession = async (space) => {
      setErr("");
      if (space.id) {
        if (!online) { setErr("📡 Pas de connexion internet. Vérifiez votre réseau et réessayez."); return; }
        if (getJsonbinKey()) {
          setActiveId(space.id + space.nom);
          setLoading(true);
          try {
            const data = await cloudRead(space.id);
            if (data && data.compagnie) {
              saveSpace({ id: space.id, nom: data.compagnie.nom, logo: data.compagnie.logo, logoUrl: data.compagnie.logoUrl });
              onReady(data, space.id, false);
              return;
            }
            setErr("Impossible de récupérer les données. Réessayez.");
          } catch (e) {
            setErr("Erreur : " + e.message);
          }
          setLoading(false); setActiveId(null);
        } else {
          setBinId(space.id);
          setMode("connecter");
        }
      } else {
        const backup = localStorage.getItem(localBackupKey(space.nom));
        if (backup) {
          try { onReady(JSON.parse(backup), null, false); return; } catch {}

        setErr("Données locales introuvables pour cet espace.");
      }
    };

    const doDelete = (space) => {
      removeSpace(space);
      setSpaces(getSpaces());
      setConfirmDel(null);
    };

    return (
      <div className="tp-screen" style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: T.bg, padding: 20, position: "relative" }}>

            <div style={{ position: "absolute", width: 320, height: 320, borderRadius: "50%", border: `1px solid ${T.gold}14`, top: -120, left: "50%", transform: "translateX(-50%)" }} />
            <div style={{ position: "absolute", inset: 0, backgroundImage: `radial-gradient(${T.gold}22 1px, transparent 1px)`, backgroundSize: "16px 16px", opacity: 0.35, maskImage: "radial-gradient(circle at 50% 30%, #000 0%, transparent 70%)" }} />
            <div style={{ width: 74, height: 74, borderRadius: 20, background: `linear-gradient(135deg, ${T.gold}, ${T.goldL})`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 34, marginBottom: 14, boxShadow: `0 10px 28px ${T.gold}55`, position: "relative" }}>🚌</div>
            <div style={{ fontSize: 24, fontWeight: 900, letterSpacing: 0.3, position: "relative" }}>
              <span style={{ color: T.text }}>Transit</span><span style={{ color: T.gold }}>Pro</span><span style={{ color: T.gold }}>.</span>
            </div>
            <div style={{ width: 34, height: 2.5, background: `linear-gradient(90deg, ${T.gold}, transparent)`, margin: "8px auto 8px", borderRadius: 4, position: "relative" }} />

          </div>

          {/* Panneau contenu */}
          <div style={{ flex: 1, padding: desktop ? "36px 34px" : "26px 22px 30px", display: "flex", flexDirection: "column" }}>
            <div style={{ fontSize: 18, fontWeight: 900, color: T.text, marginBottom: 3 }}>Choisir un espace</div>
            <div style={{ fontSize: 12, color: T.textMuted, marginBottom: 18 }}>{spaces.length ? `${spaces.length} espace${spaces.length > 1 ? "s" : ""} disponible${spaces.length > 1 ? "s" : ""}` : "Aucun espace enregistré sur cet appareil"}</div>

            {spaces.length ? (
              <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 8, maxHeight: desktop ? 260 : 220, overflowY: "auto" }}>
                {spaces.map(space => {
                  const key = (space.id || "local") + space.nom;
                  const isBusy = loading && activeId === (space.id + space.nom);
                  return confirmDel === key ? (
                    <div key={key} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", border: `1px solid ${T.red}55`, borderRadius: 14, background: `${T.red}10` }}>
                      <div style={{ flex: 1, fontSize: 12, color: T.text, fontWeight: 700 }}>Retirer "{space.nom}" de cet appareil ?</div>
                      <button onClick={() => doDelete(space)} style={{ background: T.red, color: "#fff", border: "none", borderRadius: 8, padding: "6px 10px", fontSize: 11, fontWeight: 800, cursor: "pointer" }}>Retirer</button>
                      <button onClick={() => setConfirmDel(null)} style={{ background: "none", border: `1px solid ${T.border}`, color: T.textSub, borderRadius: 8, padding: "6px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>Annuler</button>
                    </div>
                  ) : (
                    <div key={key} onClick={loading ? undefined : () => resumeSession(space)} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", border: `1px solid ${T.border}`, borderRadius: 14, cursor: loading ? "default" : "pointer", background: T.surfaceL, opacity: loading && !isBusy ? 0.5 : 1 }}>
                      <div style={{ width: 40, height: 40, borderRadius: 11, background: `${T.gold}22`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, fontWeight: 900, color: T.gold, flexShrink: 0, overflow: "hidden" }}>
                        {space.logoUrl ? <CompanyLogo logoUrl={space.logoUrl} size={40} radius={11} /> : (space.nom?.[0]?.toUpperCase() || "🚌")}
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 800, fontSize: 14, color: T.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{space.nom}</div>
                        <div style={{ fontSize: 11, color: T.textMuted, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{isBusy ? "Connexion en cours…" : space.id ? "Compagnie cloud" : "Session locale"}</div>

                        <button onClick={(e) => { e.stopPropagation(); setConfirmDel(key); }} aria-label="Retirer cet espace" disabled={loading}

                Créez votre compagnie ou récupérez un espace existant.
              </div>

            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── CRÉER ──
  if (mode === "creer") {
    return (
      <div className="tp-screen" style={{ minHeight: "100vh", background: T.bg, padding: 24, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div style={{ width: "100%", maxWidth: 340 }}>
          <button onClick={() => setMode("home")} style={{ background: "none", border: "none", color: T.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", marginBottom: 18 }}>← Retour</button>
          <div style={{ fontSize: 20, fontWeight: 900, color: T.gold, marginBottom: 4 }}>🏢 Nouvelle compagnie</div>

          <div style={{ background: T.surface, borderRadius: 16, padding: 20, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Infos compagnie</div>
            {inp(nom, setNom, "Nom de la compagnie *")}
            {inp(ville, setVille, "Ville (ex: Abidjan)")}
            {inp(pays, setPays, "Pays")}
            <div style={{ height: 1, background: T.border, margin: "12px 0" }} />
            <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Codes PIN (4 chiffres)</div>

            {inp(caissierPin, setCaissierPin, "PIN Caissier *", "pin")}

              {loading ? <><span className="tp-spinner" /> Création en cours…</> : "✅ Créer ma compagnie"}

              <input type={showKey ? "text" : "password"} value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="$2a$10$..."

                {showKey ? "🙈" : "👁️"}

              Sur un nouvel appareil, cette clé est indispensable (même compte jsonbin.io que sur votre premier appareil). Retrouvez-la sur jsonbin.io → API Keys.
            </div>
            {err && <div style={{ color: T.red, fontSize: 12, fontWeight: 700, marginBottom: 10, padding: "8px 12px", background: `${T.red}18`, borderRadius: 8 }}>⚠️ {err}</div>}

              {loading ? <><span className="tp-spinner" /> Chargement…</> : "🔓 Charger mes données"}
            </button>
          </div>
          <div style={{ marginTop: 14, fontSize: 10, color: T.textMuted, textAlign: "center" }}>
            L'ID vous a été fourni lors de la création de votre compagnie.
          </div>
        </div>
      </div>
    );
  }

  // ── SYNC ──
  if (mode === "sync") {
    return (
      <div className="tp-screen" style={{ minHeight: "100vh", background: T.bg, padding: 24, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
        <div style={{ width: "100%", maxWidth: 340 }}>
          <button onClick={() => setMode("home")} style={{ background: "none", border: "none", color: T.gold, fontSize: 13, fontWeight: 700, cursor: "pointer", marginBottom: 18 }}>← Retour</button>
          <div style={{ fontSize: 20, fontWeight: 900, color: T.blue, marginBottom: 4 }}>☁️ Récupérer / Synchroniser</div>
          <div style={{ fontSize: 12, color: T.textSub, marginBottom: 20 }}>Rechargez vos données depuis le cloud</div>

          <div style={{ background: T.surface, borderRadius: 16, padding: 20, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>ID de compagnie</div>
            <input value={binId} onChange={e => setBinId(e.target.value)} placeholder="ex: 6867a1b48960c979a5967xxx"
              style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 9, padding: "11px 14px", color: T.text, fontSize: 13, outline: "none", boxSizing: "border-box", marginBottom: 10, fontFamily: "monospace" }} />
            <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>Clé API JSONBin (X-Master-Key)</div>
            <div style={{ position: "relative", marginBottom: 10 }}>
              <input type={showKey ? "text" : "password"} value={apiKey} onChange={e => setApiKey(e.target.value)} placeholder="$2a$10$..."
                style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 9, padding: "11px 40px 11px 14px", color: T.text, fontSize: 12, outline: "none", boxSizing: "border-box", fontFamily: "monospace" }} />
              <button type="button" onClick={() => setShowKey(v => !v)} aria-label={showKey ? "Masquer la clé" : "Afficher la clé"}
                style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: T.textMuted, fontSize: 14, cursor: "pointer", padding: 6 }}>
                {showKey ? "🙈" : "👁️"}
              </button>
            </div>
            <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 10, lineHeight: 1.4 }}>
              Sur un nouvel appareil, cette clé est indispensable (même compte jsonbin.io que sur votre premier appareil). Retrouvez-la sur jsonbin.io → API Keys.
            </div>
            {err && <div style={{ color: T.red, fontSize: 12, fontWeight: 700, marginBottom: 10, padding: "8px 12px", background: `${T.red}18`, borderRadius: 8 }}>⚠️ {err}</div>}
            <button onClick={handleSync} disabled={loading} style={btnStyle(T.blue, false)}>
              {loading ? <><span className="tp-spinner" /> Synchronisation…</> : "☁️ Synchroniser depuis le cloud"}
            </button>
          </div>
          <div style={{ marginTop: 14, fontSize: 10, color: T.textMuted, textAlign: "center" }}>
            Cette action remplace les données locales par celles du cloud.
          </div>
        </div>
      </div>
    );
  }

  return null;
}

const PIN_LOCK_KEY = "transitpro_pin_lock";
const PIN_MAX_ATTEMPTS = 5;
const PIN_LOCK_MS = 30000;

function readPinLock() {
  try { return JSON.parse(localStorage.getItem(PIN_LOCK_KEY)) || { attempts: 0, lockUntil: 0 }; }
  catch { return { attempts: 0, lockUntil: 0 }; }
}

// ═══════════════════════════════════════════════════════════
// ÉCRAN LOGIN PIN — après sélection compagnie
// ═══════════════════════════════════════════════════════════
function LoginScreen({ db, onLogin, T, toggleTheme, isDark, onRetour, binId }) {
  const [pin, setPin] = useState("");
  const [login, setLogin] = useState("");
  const [err, setErr] = useState(false);
  const [tick, setTick] = useState("");
  const [showId, setShowId] = useState(false);
  const [lockUntil, setLockUntil] = useState(() => {
    const rec = readPinLock();
    return rec.lockUntil > Date.now() ? rec.lockUntil : 0;
  });
  const [remaining, setRemaining] = useState(0);
  const c = db.compagnie;

  useEffect(() => {
    const t = setInterval(() => setTick(new Date().toLocaleTimeString("fr-FR")), 1000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (!lockUntil) return;
    const iv = setInterval(() => {
      const r = Math.max(0, Math.ceil((lockUntil - Date.now()) / 1000));
      setRemaining(r);
      if (r <= 0) {
        setLockUntil(0);
        localStorage.setItem(PIN_LOCK_KEY, JSON.stringify({ attempts: 0, lockUntil: 0 }));
        clearInterval(iv);
      }
    }, 250);
    return () => clearInterval(iv);
  }, [lockUntil]);

  const handlePin = (d) => {
    if (err || lockUntil) return;
    if (d === "DEL") { setPin(p => p.slice(0, -1)); return; }
    const next = pin + d;
    if (next.length > 4) return;
    setPin(next);
    if (next.length === 4) {
      const found = db.users.find(u => (!login || u.login === login) && u.pin === next);
      if (found) {
        localStorage.setItem(PIN_LOCK_KEY, JSON.stringify({ attempts: 0, lockUntil: 0 }));
        onLogin(found);
      } else {
        const rec = readPinLock();
        rec.attempts = (rec.attempts || 0) + 1;
        if (rec.attempts >= PIN_MAX_ATTEMPTS) {
          rec.lockUntil = Date.now() + PIN_LOCK_MS;
          rec.attempts = 0;
          localStorage.setItem(PIN_LOCK_KEY, JSON.stringify(rec));
          setLockUntil(rec.lockUntil);
        } else {
          localStorage.setItem(PIN_LOCK_KEY, JSON.stringify(rec));
        }
        setErr(true);
        setTimeout(() => { setPin(""); setErr(false); }, 1200);
      }
    }
  };

  const attemptsLeft = PIN_MAX_ATTEMPTS - (readPinLock().attempts || 0);

  useEffect(() => {
    const onKey = (e) => {
      if (/^[0-9]$/.test(e.key)) handlePin(e.key);
      else if (e.key === "Backspace") handlePin("DEL");
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [pin, login, err, lockUntil]);

  return (
    <div className="tp-screen" style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: T.bg, padding: 24, position: "relative" }}>
      <button onClick={toggleTheme} aria-label="Changer de thème" style={{ position: "absolute", top: 18, right: 18, background: T.surface, border: `1px solid ${T.border}`, borderRadius: 10, padding: "6px 12px", fontSize: 16, cursor: "pointer" }}>{isDark ? "☀️" : "🌙"}</button>
      <button onClick={onRetour} style={{ position: "absolute", top: 18, left: 18, background: "none", border: "none", color: T.gold, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>← Changer</button>
      <div style={{ fontSize: 10, color: T.textMuted, position: "absolute", top: 52, left: 18, fontWeight: 600 }}>{tick}</div>
      <div style={{ marginBottom: 8 }}><CompanyLogo logoUrl={c.logoUrl} logo={c.logo} size={58} radius={14} /></div>
      <div style={{ fontSize: 22, fontWeight: 900, color: T.gold }}>{c.nom}</div>
      <div style={{ fontSize: 12, color: T.textSub, marginBottom: 4 }}>{c.slogan}</div>
      <button onClick={() => setShowId(v => !v)} style={{ fontSize: 10, color: T.textMuted, background: "none", border: "none", cursor: "pointer", marginBottom: 20, textDecoration: "underline" }}>
        {showId ? binId : "Voir l'ID de la compagnie"}
      </button>
      <div style={{ background: T.surface, borderRadius: 18, padding: 22, width: "100%", maxWidth: 310, border: `1px solid ${T.border}` }}>
        <div style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 10, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 4 }}>Utilisateur (optionnel)</div>
          <input value={login} onChange={e => setLogin(e.target.value)} placeholder="admin / caissier" autoFocus
            style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 8, padding: "8px 12px", color: T.text, fontSize: 13, outline: "none", boxSizing: "border-box" }} />
        </div>
        <div style={{ textAlign: "center", fontSize: 12, color: T.textSub, marginBottom: 14, fontWeight: 600 }}>Code PIN</div>
        <div className={err ? "tp-shake" : ""} style={{ display: "flex", justifyContent: "center", gap: 14, marginBottom: 16 }}>
          {[0, 1, 2, 3].map(i => <div key={i} style={{ width: 15, height: 15, borderRadius: "50%", background: err ? T.red : i < pin.length ? T.gold : T.border, transition: "all 0.15s" }} />)}
        </div>
        <div style={{ textAlign: "center", color: T.red, fontSize: 12, fontWeight: 700, marginBottom: 8, minHeight: 16 }}>
          {lockUntil ? `🔒 Trop d'essais — réessayez dans ${remaining}s` : err ? "PIN incorrect" : (attemptsLeft < PIN_MAX_ATTEMPTS && attemptsLeft > 0 ? `${attemptsLeft} essai${attemptsLeft > 1 ? "s" : ""} restant${attemptsLeft > 1 ? "s" : ""}` : "")}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, opacity: lockUntil ? 0.4 : 1, pointerEvents: lockUntil ? "none" : "auto" }}>
          {["1","2","3","4","5","6","7","8","9","DEL","0",""].map(d => (
            d === "" ? <div key="spacer" /> :
            <button key={d} onClick={() => handlePin(d)} disabled={!!lockUntil} aria-label={d === "DEL" ? "Effacer" : `Chiffre ${d}`}
              style={{ padding: 13, borderRadius: 11, border: `1px solid ${T.border}`, background: d === "DEL" ? `${T.red}18` : T.surfaceLL, color: d === "DEL" ? T.red : T.text, fontSize: 17, fontWeight: 800, cursor: "pointer" }}>
              {d}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MODAL ID AFFICHÉ APRÈS CRÉATION
// ═══════════════════════════════════════════════════════════
function IDModal({ binId, nomCompagnie, T, onClose }) {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    navigator.clipboard.writeText(binId).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };
  const isLocalOnly = !binId;
  return (
    <div style={{ position: "fixed", inset: 0, background: "#000D", zIndex: 999, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ background: T.surface, borderRadius: 20, padding: 28, width: "100%", maxWidth: 340, border: `2px solid ${isLocalOnly ? T.blue : T.gold}` }}>
        <div style={{ textAlign: "center", fontSize: 40, marginBottom: 8 }}>{isLocalOnly ? "📱" : "🎉"}</div>
        <div style={{ fontSize: 18, fontWeight: 900, color: isLocalOnly ? T.blue : T.gold, textAlign: "center", marginBottom: 4 }}>Compagnie créée !</div>
        <div style={{ fontSize: 13, color: T.textSub, textAlign: "center", marginBottom: 20 }}>{nomCompagnie}</div>

        {isLocalOnly ? (
          <div style={{ background: `${T.blue}15`, borderRadius: 10, padding: "12px 14px", marginBottom: 16, fontSize: 12, color: T.text, lineHeight: 1.5 }}>
            ☁️ La synchronisation cloud n'est pas encore activée. Vos données restent sur cet appareil pour l'instant.<br /><br />
            Pour activer la sync (et accéder depuis un autre appareil), allez dans <strong>Configuration → Synchronisation</strong> et ajoutez votre clé API.
          </div>
        ) : (
          <>
            <div style={{ background: T.surfaceL, borderRadius: 12, padding: 16, marginBottom: 16, textAlign: "center", border: `1px solid ${T.border}` }}>
              <div style={{ fontSize: 10, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 6 }}>🔑 Votre ID unique</div>
              <div style={{ fontSize: 12, fontFamily: "monospace", color: T.gold, wordBreak: "break-all", fontWeight: 700, letterSpacing: 0.5 }}>{binId}</div>
            </div>
            <div style={{ background: `${T.red}15`, borderRadius: 10, padding: "10px 14px", marginBottom: 16, fontSize: 11, color: T.red, fontWeight: 700 }}>
              ⚠️ Notez cet ID ! Il vous permettra de vous reconnecter depuis n'importe quel appareil.
            </div>
            <button onClick={copy} style={{ width: "100%", padding: 12, borderRadius: 10, background: copied ? T.green : T.gold, color: "#fff", border: "none", fontSize: 14, fontWeight: 800, cursor: "pointer", marginBottom: 10 }}>
              {copied ? "✅ Copié !" : "📋 Copier l'ID"}
            </button>
          </>
        )}
        <button onClick={onClose} style={{ width: "100%", padding: 12, borderRadius: 10, background: "transparent", color: T.textSub, border: `1px solid ${T.border}`, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
          Continuer vers l'application →
        </button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// APP LOGIN
// ═══════════════════════════════════════════════════════════
function AppLogin() {
  const [isDark, setIsDark] = useState(() => {
    try { return localStorage.getItem("transitpro_theme") !== "light"; } catch { return true; }
  });
  const T = themes[isDark ? "dark" : "light"];
  const [db, setDB] = useState(null);
  const [binId, setBinId] = useState(null);
  const [showIDModal, setShowIDModal] = useState(false);

  useEffect(() => {
    document.body.dataset.theme = isDark ? "dark" : "light";
    document.body.style.background = T.bg;
  }, [isDark]);

  const toggleTheme = () => {
    setIsDark(d => {
      const next = !d;
      try { localStorage.setItem("transitpro_theme", next ? "dark" : "light"); } catch {}
      return next;
    });
  };

  const handleReady = (data, id, isNew = false) => {
    setDB(data);
    setBinId(id);
    if (isNew) setShowIDModal(true);
  };

  const handleIDModalClose = () => setShowIDModal(false);

  const handleLogin = (user) => {
    try {
      const payload = JSON.stringify({ db, binId, userId: user.id, isDark });
      localStorage.setItem("transitpro_session", payload);
      // Vérifie que l'écriture a bien été persistée avant de rediriger
      const check = localStorage.getItem("transitpro_session");
      if (!check) throw new Error("Écriture non persistée");
    } catch (e) {
      console.error("Erreur sauvegarde session", e);
      const isQuota = e && (e.name === "QuotaExceededError" || /quota/i.test(e.message || ""));
      alert(isQuota
        ? "⚠️ Stockage local plein. Réduisez la taille du logo de votre compagnie (Configuration) ou libérez de l'espace dans votre navigateur, puis réessayez."
        : "⚠️ Impossible de sauvegarder la session localement. Vérifiez que le mode privé/incognito n'est pas activé, puis réessayez.");
      return; // ne redirige pas si la session n'a pas pu être sauvegardée
    }
    window.location.href = "index.html";
  };

  const handleRetour = () => { setDB(null); setBinId(null); };

  if (!db) return <OnboardingScreen T={T} isDark={isDark} toggleTheme={toggleTheme} onReady={handleReady} />;
  if (showIDModal) return <IDModal binId={binId} nomCompagnie={db.compagnie.nom} T={T} onClose={handleIDModalClose} />;
  return <LoginScreen db={db} binId={binId} onLogin={handleLogin} T={T} toggleTheme={toggleTheme} isDark={isDark} onRetour={handleRetour} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppLogin />);
