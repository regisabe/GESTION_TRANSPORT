function ColisReceiptModal({ colis, db, T, onClose }) {
  const ref = useRef();
  const handlePrint = () => {
    const win = window.open("", "_blank", "width=420,height=820");
    win.document.write(`<html><head><title>${colis.id}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#fff;display:flex;flex-direction:column;align-items:center;padding:10px;}</style></head><body>${ref.current.innerHTML}</body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 400);
  };
  return (
    <Modal title="📦 Reçu Colis Express" onClose={onClose} T={T}>
      <div ref={ref} dangerouslySetInnerHTML={{ __html: buildColisReceiptHTML(colis, db.compagnie) }} style={{ transform: "scale(0.82)", transformOrigin: "top center" }} />
      <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
        <Btn onClick={handlePrint} color={CYAN_COLIS} full>🖨️ Imprimer (double bon)</Btn>
        <Btn onClick={onClose} color={T.textMuted} outline>Fermer</Btn>
      </div>
    </Modal>
  );
}

function ColisExpressSection({ db, setDB, user, T }) {
  const [toast, show] = useToast();
  const [vue, setVue] = useState("envoyer");
  const [printColis, setPrintColis] = useState(null);
  const [ticketSearch, setTicketSearch] = useState("");
  const [ticketFound, setTicketFound] = useState(null);
  const [ticketError, setTicketError] = useState("");

  const emptyForm = {
    expediteurNom: "", expediteurTel: "",
    destinataireNom: "", destinataireTel: "",
    origine: "", destination: "",
    description: "", poids: "", fragile: false,
    paiement: "Espèces", prix: "", ticketRef: "",
  };
  const [form, setForm] = useState(emptyForm);
  const s = (k, v) => setForm(f => ({ ...f, [k]: v }));

  // Recherche ticket pour remplir expéditeur
  const rechercherTicket = (id) => {
    const q = id.trim().toUpperCase();
    setTicketSearch(q);
    setTicketError("");
    setTicketFound(null);
    if (!q) return;
    const vente = db.ventes.find(v => v.ticketId && v.ticketId.toUpperCase() === q);
    if (vente) {
      setTicketFound(vente);
      setForm(f => ({
        ...f,
        expediteurNom: vente.passager || "",
        expediteurTel: vente.passagerTel || "",
        origine: vente.depart || "",
        destination: vente.arrivee || "",
        ticketRef: vente.ticketId,
      }));
      show("✅ Passager trouvé — champs pré-remplis !");
    } else if (q.length >= 3) {
      setTicketError("Ticket introuvable. Remplissez manuellement.");
    }
  };

  // Appliquer tarif depuis les tarifs colis express
  const appliquerTarif = (tarif) => {
    setForm(f => ({ ...f, prix: tarif.prixBase }));
  };

  const envoyer = () => {
    if (!form.expediteurNom.trim()) { show("Nom expéditeur requis", "error"); return; }
    if (!form.destinataireNom.trim()) { show("Nom destinataire requis", "error"); return; }
    if (!form.destination.trim()) { show("Destination requise", "error"); return; }
    if (!form.prix || parseInt(form.prix) <= 0) { show("Prix requis", "error"); return; }
    const now = new Date();
    const id = `${db.colisPrefix || "CX"}-${String(db.colisCounter || 1).padStart(4, "0")}`;
    const newColis = {
      id,
      ...form,
      prix: parseInt(form.prix) || 0,
      statut: "En attente",
      agent: user.nom,
      date: now.toLocaleDateString("fr-FR"),
      heureEmission: now.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }),
    };
    setDB(d => ({
      ...d,
      colisCounter: (d.colisCounter || 1) + 1,
      colis: [...(d.colis || []), newColis],
    }));
    setPrintColis(newColis);
    setForm(emptyForm);
    setTicketSearch("");
    setTicketFound(null);
    show(`✅ Colis ${id} enregistré !`);
  };

  const majStatut = (id, statut) => {
    setDB(d => ({ ...d, colis: (d.colis || []).map(c => c.id === id ? { ...c, statut } : c) }));
    show(`✅ Statut mis à jour : ${statut}`);
  };

  const colisList = db.colis || [];
  const totalRecettes = colisList.reduce((s, c) => s + (c.prix || 0), 0);

  const [search, setSearch] = useState("");
  const [filtreStatut, setFiltreStatut] = useState("Tous");
  const colisFiltrés = colisList.filter(c => {
    if (filtreStatut !== "Tous" && c.statut !== filtreStatut) return false;
    if (search && !`${c.id} ${c.expediteurNom} ${c.destinataireNom} ${c.destination} ${c.description}`.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }).slice().reverse();

  const statutColors = { "En attente": T.blue, "Pris en charge": T.orange, "En transit": T.gold, "Livré": T.green, "Retourné": T.red };

  return (
    <div style={{ padding: "0 14px" }}>
      <Toast msg={toast.msg} type={toast.type} />
      {printColis && <ColisReceiptModal colis={printColis} db={db} T={T} onClose={() => setPrintColis(null)} />}

      {/* KPI */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
        {[
          { l: "Total", v: colisList.length, c: CYAN_COLIS },
          { l: "En transit", v: colisList.filter(c => c.statut === "En transit").length, c: T.gold },
          { l: "Livrés", v: colisList.filter(c => c.statut === "Livré").length, c: T.green },
          { l: "Recettes", v: `${totalRecettes.toLocaleString()} F`, c: T.gold },
        ].map(s => (
          <div key={s.l} style={{ background: T.surface, borderRadius: 12, padding: "10px 6px", textAlign: "center", borderTop: `2px solid ${s.c}`, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 14, fontWeight: 900, color: s.c }}>{s.v}</div>
            <div style={{ fontSize: 8, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginTop: 2 }}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* TABS */}
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {[["envoyer","📦 Nouveau colis"], ["suivi","📋 Suivi & Historique"], ["tarifs","💰 Tarifs"]].map(([id, label]) => (
          <button key={id} onClick={() => setVue(id)}
            style={{ flex: 1, padding: "8px 4px", borderRadius: 10, border: "none", fontSize: 10, fontWeight: 700, cursor: "pointer", background: vue === id ? CYAN_COLIS : T.surfaceLL, color: vue === id ? "#fff" : T.textSub }}>
            {label}
          </button>
        ))}
      </div>

      {/* ── ENVOI COLIS ── */}
      {vue === "envoyer" && (
        <div>
          {/* Liaison ticket */}
          <Card T={T} style={{ border: `2px solid ${CYAN_COLIS}66`, marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: CYAN_COLIS, marginBottom: 8 }}>🎫 Lier à un billet (optionnel)</div>
            <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 10 }}>Si l'expéditeur est un passager, entrez son N° de ticket pour pré-remplir ses informations.</div>
            <div style={{ display: "flex", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <Inp value={ticketSearch} onChange={e => rechercherTicket(e.target.value)} placeholder="Ex: TP-001" T={T} />
              </div>
              <button onClick={() => { setTicketSearch(""); setTicketFound(null); setTicketError(""); s("ticketRef",""); }}
                style={{ background: `${T.red}18`, color: T.red, border: "none", borderRadius: 8, padding: "0 12px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>✕</button>
            </div>
            {ticketFound && (
              <div style={{ background: `${CYAN_COLIS}18`, border: `1px solid ${CYAN_COLIS}44`, borderRadius: 10, padding: "10px 12px", marginTop: 8 }}>
                <div style={{ fontSize: 10, color: CYAN_COLIS, fontWeight: 800, marginBottom: 6 }}>✅ Billet {ticketFound.ticketId} — {ticketFound.passager}</div>
                <div style={{ fontSize: 11, color: T.textSub }}>{ticketFound.dest} · {ticketFound.heureDep}</div>
              </div>
            )}
            {ticketError && (
              <div style={{ background: `${T.red}18`, border: `1px solid ${T.red}44`, borderRadius: 8, padding: "8px 12px", fontSize: 11, color: T.red, marginTop: 8 }}>⚠️ {ticketError}</div>
            )}
          </Card>

          {/* Expéditeur */}
          <Card T={T} style={{ border: `1px solid ${CYAN_COLIS}44`, marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: CYAN_COLIS, marginBottom: 12 }}>📤 Expéditeur</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <Fld label="Nom *" T={T}><Inp value={form.expediteurNom} onChange={e => s("expediteurNom", e.target.value)} placeholder="Nom expéditeur" T={T} /></Fld>
              <Fld label="Téléphone" T={T}><Inp value={form.expediteurTel} onChange={e => s("expediteurTel", e.target.value)} placeholder="+221 77…" type="tel" T={T} /></Fld>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <Fld label="Ville d'origine *" T={T}>
                <Sel value={form.origine} onChange={e => s("origine", e.target.value)} T={T}>
                  <option value="">— Ville —</option>
                  {[...new Set(db.routes.flatMap(r => [r.depart, r.arrivee]))].map(v => <option key={v}>{v}</option>)}
                </Sel>
              </Fld>
              <Fld label="Ville destination *" T={T}>
                <Sel value={form.destination} onChange={e => s("destination", e.target.value)} T={T}>
                  <option value="">— Ville —</option>
                  {[...new Set(db.routes.flatMap(r => [r.depart, r.arrivee]))].map(v => <option key={v}>{v}</option>)}
                </Sel>
              </Fld>
            </div>
          </Card>

          {/* Destinataire */}
          <Card T={T} style={{ border: `1px solid ${CYAN_COLIS}44`, marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: CYAN_COLIS, marginBottom: 12 }}>📥 Destinataire</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <Fld label="Nom *" T={T}><Inp value={form.destinataireNom} onChange={e => s("destinataireNom", e.target.value)} placeholder="Nom destinataire" T={T} /></Fld>
              <Fld label="Téléphone *" T={T}><Inp value={form.destinataireTel} onChange={e => s("destinataireTel", e.target.value)} placeholder="+221 77…" type="tel" T={T} /></Fld>
            </div>
          </Card>

          {/* Détail colis */}
          <Card T={T} style={{ border: `1px solid ${CYAN_COLIS}44`, marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: CYAN_COLIS, marginBottom: 12 }}>📦 Détail du colis</div>
            <Fld label="Description du contenu *" T={T}>
              <Inp value={form.description} onChange={e => s("description", e.target.value)} placeholder="Ex: Médicaments, vêtements…" T={T} />
            </Fld>
            <Fld label="Poids / Volume" T={T}>
              <Inp value={form.poids} onChange={e => s("poids", e.target.value)} placeholder="Ex: 3 kg, 2 cartons" T={T} />
            </Fld>
            <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", marginBottom: 12 }}>
              <input type="checkbox" checked={form.fragile} onChange={e => s("fragile", e.target.checked)}
                style={{ width: 18, height: 18, accentColor: T.red }} />
              <span style={{ fontSize: 13, fontWeight: 700, color: T.red }}>⚠️ Colis fragile (mention imprimée)</span>
            </label>

            {/* Tarifs suggérés */}
            {(db.tarifsColisExpress || []).length > 0 && (
              <div style={{ background: T.surfaceLL, borderRadius: 10, padding: 10, marginBottom: 10 }}>
                <div style={{ fontSize: 9, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 8 }}>Tarifs suggérés (cliquer pour appliquer)</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {(db.tarifsColisExpress || []).map(t => (
                    <button key={t.id} onClick={() => appliquerTarif(t)}
                      style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: parseInt(form.prix) === t.prixBase ? `${CYAN_COLIS}22` : T.surface, border: `1px solid ${parseInt(form.prix) === t.prixBase ? CYAN_COLIS : T.border}`, borderRadius: 8, padding: "6px 10px", cursor: "pointer" }}>
                      <div style={{ textAlign: "left" }}>
                        <div style={{ fontSize: 11, fontWeight: 700, color: T.text }}>{t.nom}</div>
                        <div style={{ fontSize: 9, color: T.textMuted }}>{t.poids} · ⏱ {t.delai}</div>
                      </div>
                      <span style={{ fontSize: 14, fontWeight: 900, color: parseInt(form.prix) === t.prixBase ? CYAN_COLIS : T.gold }}>{t.prixBase.toLocaleString()} F</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            <Fld label={`Prix total (${db.compagnie.devise || "FCFA"}) *`} T={T}>
              <Inp type="number" value={form.prix} onChange={e => s("prix", e.target.value)} placeholder="Ex: 2500" T={T} />
            </Fld>
          </Card>

          {/* Paiement */}
          <Card T={T} style={{ border: `1px solid ${CYAN_COLIS}44`, marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 800, color: CYAN_COLIS, marginBottom: 10 }}>💳 Mode de paiement</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
              {PAIEMENTS.map(p => (
                <button key={p} onClick={() => s("paiement", p)}
                  style={{ padding: "7px 12px", borderRadius: 8, border: `1.5px solid ${form.paiement === p ? CYAN_COLIS : T.border}`, background: form.paiement === p ? `${CYAN_COLIS}22` : T.inputBg, color: form.paiement === p ? CYAN_COLIS : T.textSub, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                  {p}
                </button>
              ))}
            </div>
          </Card>

          {/* Récapitulatif */}
          {form.expediteurNom && form.destinataireNom && form.prix && (
            <Card T={T} style={{ background: `${CYAN_COLIS}11`, border: `1.5px solid ${CYAN_COLIS}55`, marginBottom: 12 }}>
              <div style={{ fontSize: 12, fontWeight: 800, color: CYAN_COLIS, marginBottom: 8 }}>📋 Récapitulatif</div>
              {[
                ["Expéditeur", `${form.expediteurNom}${form.expediteurTel ? " · " + form.expediteurTel : ""}`],
                ["Destinataire", `${form.destinataireNom}${form.destinataireTel ? " · " + form.destinataireTel : ""}`],
                ["Trajet", form.origine && form.destination ? `${form.origine} → ${form.destination}` : "—"],
                ["Description", form.description || "—"],
                ["Fragile", form.fragile ? "⚠️ OUI" : "Non"],
                ["Paiement", form.paiement],
              ].map(([l, v]) => (
                <div key={l} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                  <span style={{ color: T.textSub }}>{l}</span>
                  <span style={{ fontWeight: 700, color: T.text, textAlign: "right", maxWidth: "60%" }}>{v}</span>
                </div>
              ))}
              <div style={{ borderTop: `1px solid ${CYAN_COLIS}44`, marginTop: 8, paddingTop: 8, display: "flex", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13, fontWeight: 700 }}>Total</span>
                <span style={{ fontSize: 22, fontWeight: 900, color: CYAN_COLIS }}>{parseInt(form.prix || 0).toLocaleString()} {db.compagnie.devise || "FCFA"}</span>
              </div>
            </Card>
          )}

          <Btn onClick={envoyer} color={CYAN_COLIS} full>✅ Enregistrer le colis &amp; Imprimer</Btn>
        </div>
      )}

      {/* ── SUIVI ── */}
      {vue === "suivi" && (
        <div>
          <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
            <div style={{ flex: 1, position: "relative" }}>
              <span style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)" }}>🔍</span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="N° colis, nom, destination…"
                style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 10, padding: "9px 10px 9px 30px", color: T.text, fontSize: 12, outline: "none", boxSizing: "border-box" }} />
            </div>
          </div>
          <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 10, marginBottom: 12 }}>
            {["Tous", ...STATUTS_COLIS].map(st => (
              <button key={st} onClick={() => setFiltreStatut(st)}
                style={{ flexShrink: 0, padding: "5px 11px", borderRadius: 20, border: "none", fontSize: 10, fontWeight: 700, cursor: "pointer", background: filtreStatut === st ? CYAN_COLIS : T.surfaceLL, color: filtreStatut === st ? "#fff" : T.textSub }}>
                {st}
              </button>
            ))}
          </div>
          {colisFiltrés.length === 0 ? (
            <Card T={T} style={{ textAlign: "center", padding: "30px 0" }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>📦</div>
              <div style={{ color: T.textMuted, fontSize: 12 }}>Aucun colis trouvé</div>
            </Card>
          ) : colisFiltrés.map(c => (
            <Card key={c.id} T={T} border={statutColors[c.statut] || T.border} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                <div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <span style={{ fontWeight: 900, color: CYAN_COLIS, fontSize: 14 }}>{c.id}</span>
                    {c.fragile && <span style={{ background: `${T.red}22`, color: T.red, fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 20 }}>⚠️ FRAGILE</span>}
                  </div>
                  <div style={{ fontSize: 11, color: T.textSub, marginTop: 2 }}>{c.expediteurNom} → {c.destinataireNom}</div>
                </div>
                <span style={{ background: `${statutColors[c.statut] || T.textMuted}22`, color: statutColors[c.statut] || T.textMuted, fontSize: 10, fontWeight: 700, padding: "3px 9px", borderRadius: 20 }}>{c.statut}</span>
              </div>
              <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 4 }}>
                📍 {c.origine || "—"} → {c.destination} · {c.description}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 10, color: T.textMuted }}>{c.date} {c.heureEmission} · 👤 {c.agent}</span>
                <span style={{ fontSize: 15, fontWeight: 900, color: CYAN_COLIS }}>{c.prix.toLocaleString()} F</span>
              </div>
              {c.ticketRef && <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 8 }}>🎫 Billet lié: {c.ticketRef}</div>}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                <Btn onClick={() => setPrintColis(c)} color={CYAN_COLIS} outline small>🖨️ Réimprimer</Btn>
                {STATUTS_COLIS.filter(st => st !== c.statut).map(st => (
                  <button key={st} onClick={() => majStatut(c.id, st)}
                    style={{ padding: "4px 10px", borderRadius: 8, border: `1px solid ${statutColors[st] || T.border}`, background: "none", color: statutColors[st] || T.textSub, fontSize: 10, fontWeight: 700, cursor: "pointer" }}>
                    → {st}
                  </button>
                ))}
              </div>
            </Card>
          ))}
        </div>
      )}

      {/* ── TARIFS COLIS EXPRESS ── */}
      {vue === "tarifs" && (
        <div>
          <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 12 }}>Tarifs appliqués lors de l'envoi de colis express. Cliquer pour appliquer automatiquement.</div>
          {(db.tarifsColisExpress || []).map(t => (
            <Card key={t.id} T={T} border={CYAN_COLIS} style={{ marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 13, color: T.text }}>{t.nom}</div>
                  <div style={{ fontSize: 10, color: T.textMuted }}>{t.poids} · ⏱ {t.delai}</div>
                </div>
                <div style={{ fontSize: 18, fontWeight: 900, color: CYAN_COLIS }}>{t.prixBase.toLocaleString()} F</div>
              </div>
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}

// MODULE RAPPORTS
// ═══════════════════════════════════════════════════════════
function RapportsSection({ db, T }) {
  const [toast, show] = useToast();
  const [vue, setVue] = useState("journalier");
  const [filtreDateDeb, setFiltreDateDeb] = useState("");
  const [filtreDateFin, setFiltreDateFin] = useState("");
  const [filtreRoute, setFiltreRoute] = useState("");
  const [filtreCaissier, setFiltreCaissier] = useState("");
  const c = db.compagnie;

  // ── Liste des caissiers ayant des ventes ──
  const caissiers = [...new Set(db.ventes.map(v => v.caissier))].filter(Boolean);

  // ── Filtrage des ventes ──
  const ventesFiltrees = db.ventes.filter(v => {
    if (filtreRoute && v.dest !== filtreRoute) return false;
    if (filtreCaissier && v.caissier !== filtreCaissier) return false;
    if (filtreDateDeb && v.date) {
      const d = v.date.split("/").reverse().join("-");
      if (d < filtreDateDeb) return false;
    }
    if (filtreDateFin && v.date) {
      const d = v.date.split("/").reverse().join("-");
      if (d > filtreDateFin) return false;
    }
    return true;
  });

  const totalRecettes = ventesFiltrees.reduce((s, v) => s + v.prix, 0);
  const totalBillets = ventesFiltrees.length;

  // ── Par caissier ──
  const byCaissier = {};
  ventesFiltrees.forEach(v => {
    if (!byCaissier[v.caissier]) byCaissier[v.caissier] = { billets: 0, total: 0 };
    byCaissier[v.caissier].billets++;
    byCaissier[v.caissier].total += v.prix;
  });

  // ── Export Excel ──
  const exportExcel = (type) => {
    if (!window.XLSX) { show("XLSX non chargé", "error"); return; }
    const XLSX = window.XLSX;
    let rows = [], sheetName = "Rapport";

    if (type === "ventes") {
      sheetName = "Ventes";
      rows = [
        ["N° Ticket", "Passager", "Téléphone", "Siège", "Route", "Départ", "Date", "Heure émission", "Véhicule", "Immatriculation", "Prix", "Paiement", "Caissier"],
        ...ventesFiltrees.map(v => [v.ticketId, v.passager || "—", v.passagerTel || "—", v.siege || "—", v.dest, v.heureDep || "—", v.date, v.heure, v.vehicule || "—", v.immatriculation || "—", v.prix, v.paiement, v.caissier])
      ];
    } else if (type === "planning") {
      sheetName = "Planning";
      rows = [
        ["ID Départ", "Route", "Heure", "Statut", "Véhicule", "Immatriculation", "Chauffeur", "Places vendues", "Capacité", "Recettes"],
        ...db.planning.map(p => {
          const route = db.routes.find(r => r.id === p.routeId);
          const veh = db.vehicules.find(v => v.id === p.vehiculeId);
          const recettes = db.ventes.filter(v => v.planId === p.id).reduce((s, v) => s + v.prix, 0);
          return [p.id, route ? `${route.depart} → ${route.arrivee}` : "—", p.heure, p.statut, veh ? `${veh.marque} ${veh.modele}` : "—", veh?.immatriculation || "—", veh?.chauffeur || "—", p.vendu, veh?.capacite || 0, recettes];
        })
      ];
    } else if (type === "recettes") {
      sheetName = "Recettes par route";
      const byRoute = {};
      ventesFiltrees.forEach(v => {
        if (!byRoute[v.dest]) byRoute[v.dest] = { billets: 0, total: 0, paiements: {} };
        byRoute[v.dest].billets++;
        byRoute[v.dest].total += v.prix;
        byRoute[v.dest].paiements[v.paiement] = (byRoute[v.dest].paiements[v.paiement] || 0) + v.prix;
      });
      rows = [
        ["Route", "Billets vendus", "Recettes totales", "Espèces", "Wave", "Orange Money", "MTN Money", "Carte"],
        ...Object.entries(byRoute).map(([route, d]) => [route, d.billets, d.total, d.paiements["Espèces"] || 0, d.paiements["Wave"] || 0, d.paiements["Orange Money"] || 0, d.paiements["MTN Money"] || 0, d.paiements["Carte"] || 0])
      ];
    }

    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Style header row bold width
    const range = XLSX.utils.decode_range(ws["!ref"]);
    const colWidths = rows[0].map((_, ci) => ({ wch: Math.max(12, ...rows.map(r => String(r[ci] || "").length)) }));
    ws["!cols"] = colWidths;

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, `TransitPro_${sheetName}_${new Date().toLocaleDateString("fr-FR").replace(/\//g,"-")}.xlsx`);
    show("✅ Export Excel téléchargé !");
  };

  // ── Export PDF (impression) ──
  const exportPDF = (type) => {
    const primaryColor = c.couleurPrimaire || "#B45309";
    const logoHtml = c.logoUrl ? `<img src="${c.logoUrl}" style="width:45px;height:45px;object-fit:contain;" />` : `<span style="font-size:26px;">${c.logo}</span>`;
    const now = new Date();
    const dateStr = now.toLocaleDateString("fr-FR");
    const heureStr = now.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });

    let contenu = "";
    let titre = "";

    if (type === "ventes") {
      titre = "Rapport des ventes";
      const lignes = ventesFiltrees.map((v, i) => `
        <tr style="background:${i%2===0?"#f8f8f8":"#fff"}">
          <td style="padding:6px 8px;border-bottom:1px solid #e5e7eb;font-weight:700;color:${primaryColor};font-size:12px;">${v.ticketId}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:11px;">${v.passager||"—"}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:10px;color:#64748b;">${v.passagerTel||"—"}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:11px;text-align:center;font-weight:700;">${v.siege||"—"}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:11px;">${v.dest}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:11px;">${v.heureDep||"—"}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:11px;">${v.date||"—"}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:11px;text-align:right;font-weight:700;color:#15803d;">${v.prix.toLocaleString()}</td>
          <td style="padding:6px 8px;border-bottom:1px solid #e5e7eb;font-size:10px;color:#64748b;">${v.paiement}</td>
        </tr>`).join("");
      contenu = `
        <table style="width:100%;border-collapse:collapse;border:1px solid #e2e8f0;font-size:12px;">
          <thead><tr style="background:${primaryColor};color:#fff;">
            <th style="padding:9px 8px;text-align:left;font-size:10px;text-transform:uppercase;">Ticket</th>
            <th style="padding:9px 8px;text-align:left;font-size:10px;text-transform:uppercase;">Passager</th>
            <th style="padding:9px 8px;text-align:left;font-size:10px;text-transform:uppercase;">Téléphone</th>
            <th style="padding:9px 8px;text-align:center;font-size:10px;text-transform:uppercase;">Siège</th>
            <th style="padding:9px 8px;text-align:left;font-size:10px;text-transform:uppercase;">Route</th>
            <th style="padding:9px 8px;text-align:left;font-size:10px;text-transform:uppercase;">Départ</th>
            <th style="padding:9px 8px;text-align:left;font-size:10px;text-transform:uppercase;">Date</th>
            <th style="padding:9px 8px;text-align:right;font-size:10px;text-transform:uppercase;">Prix (${c.devise||"FCFA"})</th>
            <th style="padding:9px 8px;text-align:left;font-size:10px;text-transform:uppercase;">Paiement</th>
          </tr></thead>
          <tbody>${lignes}</tbody>
          <tfoot><tr style="background:#f1f5f9;border-top:2px solid ${primaryColor};">
            <td colspan="7" style="padding:9px 8px;font-weight:800;">TOTAL — ${totalBillets} billet(s)</td>
            <td style="padding:9px 8px;text-align:right;font-weight:900;color:${primaryColor};font-size:14px;">${totalRecettes.toLocaleString()}</td>
            <td></td>
          </tr></tfoot>
        </table>`;

    } else if (type === "recettes") {
      titre = "Rapport des recettes par route";
      const byRoute = {};
      ventesFiltrees.forEach(v => {
        if (!byRoute[v.dest]) byRoute[v.dest] = { billets: 0, total: 0, paiements: {} };
        byRoute[v.dest].billets++;

// CLOUD SYNC — JSONBin.io
// ═══════════════════════════════════════════════════════════
const JSONBIN_API = "https://api.jsonbin.io/v3";

function getJsonbinKey() {
  return localStorage.getItem("transitpro_jsonbin_key") || "";
}
function setJsonbinKey(key) {
  localStorage.setItem("transitpro_jsonbin_key", key.trim());
}

async function cloudCreate(data) {
  const key = getJsonbinKey();
  if (!key) throw new Error("Aucune clé API configurée. Allez dans Configuration > Synchronisation.");
  const r = await fetch(`${JSONBIN_API}/b`, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Master-Key": key, "X-Bin-Private": "false" },
    body: JSON.stringify(data),
  });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) {
    throw new Error(j.message || `Erreur ${r.status}`);
  }
  return j.metadata?.id || null;
}

async function cloudRead(binId) {
  const key = getJsonbinKey();
  if (!key) throw new Error("Aucune clé API configurée. Allez dans Configuration > Synchronisation.");
  const r = await fetch(`${JSONBIN_API}/b/${binId}/latest`, {
    headers: { "X-Master-Key": key },
  });
  if (!r.ok) {
    const j = await r.json().catch(() => ({}));
    throw new Error(j.message || `Erreur ${r.status}`);
  }
  const j = await r.json();
  return j.record || null;
}

async function cloudWrite(binId, data) {
  const key = getJsonbinKey();
  if (!key) return false;
  const r = await fetch(`${JSONBIN_API}/b/${binId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json", "X-Master-Key": key },
    body: JSON.stringify(data),
  });
  return r.ok;
}

// ═══════════════════════════════════════════════════════════
// FUSION MULTI-APPAREILS — évite qu'un appareil écrase les données d'un autre
// ═══════════════════════════════════════════════════════════
const MERGE_COLLECTIONS = ["ventes", "bagages", "colis", "planning", "routes", "vehicules", "sessions", "tarifsBagage"];

// Fusionne deux tableaux d'enregistrements par id (union). En cas de conflit sur le même id,
// garde l'enregistrement le plus récent (_updatedAt), sinon privilégie la version locale.
function mergeCollection(localArr, cloudArr) {
  const local = Array.isArray(localArr) ? localArr : [];
  const cloud = Array.isArray(cloudArr) ? cloudArr : [];
  const map = new Map();
  for (const item of cloud) if (item && item.id != null) map.set(item.id, item);
  for (const item of local) {
    if (!item || item.id == null) continue;
    const existing = map.get(item.id);
    if (!existing) { map.set(item.id, item); continue; }
    const lu = item._updatedAt || 0, cu = existing._updatedAt || 0;
    map.set(item.id, lu >= cu ? item : existing);
  }
  // Tri par id décroissant (Date.now() croissant = ordre chronologique) pour un affichage cohérent
  return Array.from(map.values()).sort((a, b) => (a.id > b.id ? 1 : a.id < b.id ? -1 : 0));
}

// Fusionne l'état local et l'état cloud : union des listes (ventes, bagages, colis...)
// + prend les compteurs les plus hauts + garde la config (compagnie/utilisateurs/tarifs) la plus récente.
function mergeDB(local, cloud) {
  if (!cloud || !cloud.compagnie) return local;
  if (!local || !local.compagnie) return cloud;

  const localMeta = local._meta?.updatedAt || 0;
  const cloudMeta = cloud._meta?.updatedAt || 0;
  const scalarSource = localMeta >= cloudMeta ? local : cloud; // compagnie, users, prefixes, tarifs...

  const merged = { ...scalarSource };
  for (const key of MERGE_COLLECTIONS) {
    merged[key] = mergeCollection(local[key], cloud[key]);
  }
  merged.ticketCounter = Math.max(local.ticketCounter || 1, cloud.ticketCounter || 1);
  merged.bagageCounter = Math.max(local.bagageCounter || 1, cloud.bagageCounter || 1);
  merged.colisCounter = Math.max(local.colisCounter || 1, cloud.colisCounter || 1);
  merged._meta = { updatedAt: Math.max(localMeta, cloudMeta) };
  return merged;
}

// Lit le cloud, fusionne avec l'état local, réécrit le résultat fusionné dans le cloud.
// Renvoie l'état fusionné (à appliquer localement si différent de l'état local).
async function reconcileCloud(binId, localDB) {
  const cloudDB = await cloudRead(binId).catch(() => null);
  const merged = mergeDB(localDB, cloudDB);
  await cloudWrite(binId, merged).catch(() => {});
  return merged;
}


function ProfileMenu({ user, db, setDB, T, binId, onLogout, onForceSync, lastSync }) {
  const [open, setOpen] = useState(false);
  const [view, setView] = useState("menu"); // menu | profil | password
  const [nom, setNom] = useState(user.nom);
  const [login, setLogin] = useState(user.login);
  const [oldPin, setOldPin] = useState("");
  const [newPin, setNewPin] = useState("");
  const [confirmPin, setConfirmPin] = useState("");
  const [err, setErr] = useState("");
  const [syncing, setSyncing] = useState(false);
  const ref = useRef();

  useEffect(() => {
    const onClick = (e) => { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setView("menu"); setErr(""); } };
    document.addEventListener("mousedown", onClick);
    document.addEventListener("touchstart", onClick);
    return () => { document.removeEventListener("mousedown", onClick); document.removeEventListener("touchstart", onClick); };
  }, []);

  const saveProfil = () => {
    setErr("");
    if (!nom.trim()) { setErr("Le nom est requis"); return; }
    if (!login.trim()) { setErr("Le login est requis"); return; }
    if (login.trim() !== user.login && db.users.find(u => u.login === login.trim())) { setErr("Ce login est déjà utilisé"); return; }
    setDB(d => ({ ...d, users: d.users.map(u => u.id === user.id ? { ...u, nom: nom.trim(), login: login.trim() } : u) }));
    setView("menu"); setOpen(false);
  };

  const savePassword = () => {
    setErr("");
    if (oldPin !== user.pin) { setErr("PIN actuel incorrect"); return; }
    if (newPin.length !== 4) { setErr("Le nouveau PIN doit faire 4 chiffres"); return; }
    if (newPin !== confirmPin) { setErr("Les PIN ne correspondent pas"); return; }
    setDB(d => ({ ...d, users: d.users.map(u => u.id === user.id ? { ...u, pin: newPin } : u) }));
    setOldPin(""); setNewPin(""); setConfirmPin("");
    setView("menu"); setOpen(false);
  };

  const handleSync = async () => {
    setSyncing(true);
    await onForceSync();
    setTimeout(() => setSyncing(false), 600);
  };

  const handleExport = () => {
    try {
      const dateStr = new Date().toISOString().slice(0, 10);
      const nomFichier = `transitpro_${(db.compagnie?.nom || "export").replace(/[^a-z0-9]+/gi, "_").toLowerCase()}_${dateStr}.json`;
      const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = nomFichier;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    } catch (e) {
      alert("Échec de l'export : " + e.message);
    }
  };

  const inpSt = { width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 8, padding: "9px 12px", color: T.text, fontSize: 13, outline: "none", boxSizing: "border-box", marginBottom: 10 };
  const itemSt = { display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "11px 14px", background: "none", border: "none", color: T.text, fontSize: 13, fontWeight: 600, cursor: "pointer", textAlign: "left", borderRadius: 8 };

  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button onClick={() => { setOpen(o => !o); setView("menu"); setErr(""); }}
        style={{ display: "flex", alignItems: "center", gap: 6, background: T.surfaceLL, border: `1px solid ${T.border}`, borderRadius: 20, padding: "4px 10px 4px 4px", cursor: "pointer" }}>
        <div style={{ width: 24, height: 24, borderRadius: "50%", background: user.role === "admin" ? T.gold : T.blue, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 900, color: "#fff" }}>{user.nom[0]}</div>
        <span style={{ fontSize: 11, fontWeight: 700, color: T.text }}>▾</span>
      </button>

      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 8px)", right: 0, width: 250, background: T.surface, border: `1px solid ${T.border}`, borderRadius: 14, boxShadow: "0 8px 30px #0008", zIndex: 200, overflow: "hidden" }}>

          {view === "menu" && (
            <div style={{ padding: 8 }}>
              <div style={{ padding: "8px 14px 10px", borderBottom: `1px solid ${T.border}`, marginBottom: 4 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: T.text }}>{user.nom}</div>
                <div style={{ fontSize: 10, color: T.textMuted }}>@{user.login} · {user.role}</div>
              </div>
              <button onClick={() => setView("profil")} style={itemSt} onMouseDown={e => e.preventDefault()}>👤 Modifier profil</button>
              <button onClick={() => setView("password")} style={itemSt} onMouseDown={e => e.preventDefault()}>🔒 Modifier mot de passe</button>
              <button onClick={handleSync} style={itemSt} onMouseDown={e => e.preventDefault()} disabled={syncing}>
                {syncing ? "⏳ Synchronisation..." : "☁️ Synchroniser maintenant"}
              </button>
              {binId && lastSync && <div style={{ padding: "2px 14px 8px", fontSize: 9, color: T.textMuted }}>Dernière sync : {lastSync}</div>}
              <button onClick={handleExport} style={itemSt} onMouseDown={e => e.preventDefault()}>💾 Exporter mes données (JSON)</button>
              <div style={{ height: 1, background: T.border, margin: "4px 0" }} />
              <button onClick={onLogout} style={{ ...itemSt, color: T.red }} onMouseDown={e => e.preventDefault()}>🚪 Déconnexion</button>
            </div>
          )}

          {view === "profil" && (
            <div style={{ padding: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 13, fontWeight: 800, color: T.gold }}>👤 Modifier profil</span>
                <button onClick={() => setView("menu")} style={{ background: "none", border: "none", color: T.textMuted, fontSize: 13, cursor: "pointer" }}>←</button>
              </div>
              <input value={nom} onChange={e => setNom(e.target.value)} placeholder="Nom complet" style={inpSt} />
              <input value={login} onChange={e => setLogin(e.target.value)} placeholder="Login" style={inpSt} />
              {err && <div style={{ color: T.red, fontSize: 11, fontWeight: 700, marginBottom: 8 }}>⚠️ {err}</div>}
              <button onClick={saveProfil} style={{ width: "100%", padding: 10, borderRadius: 8, background: T.gold, color: "#fff", border: "none", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>Enregistrer</button>
            </div>
          )}

          {view === "password" && (
            <div style={{ padding: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <span style={{ fontSize: 13, fontWeight: 800, color: T.gold }}>🔒 Modifier mot de passe</span>
                <button onClick={() => setView("menu")} style={{ background: "none", border: "none", color: T.textMuted, fontSize: 13, cursor: "pointer" }}>←</button>
              </div>
              <input type="password" value={oldPin} onChange={e => setOldPin(e.target.value.slice(0,4))} placeholder="PIN actuel" style={inpSt} />
              <input type="password" value={newPin} onChange={e => setNewPin(e.target.value.slice(0,4))} placeholder="Nouveau PIN (4 chiffres)" style={inpSt} />
              <input type="password" value={confirmPin} onChange={e => setConfirmPin(e.target.value.slice(0,4))} placeholder="Confirmer le nouveau PIN" style={inpSt} />
              {err && <div style={{ color: T.red, fontSize: 11, fontWeight: 700, marginBottom: 8 }}>⚠️ {err}</div>}
              <button onClick={savePassword} style={{ width: "100%", padding: 10, borderRadius: 8, background: T.gold, color: "#fff", border: "none", fontSize: 13, fontWeight: 800, cursor: "pointer" }}>Changer le PIN</button>
            </div>
          )}

        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// HOOK RESPONSIVE — détecte la taille d'écran
// ═══════════════════════════════════════════════════════════
function useViewport() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 390);
  useEffect(() => {
    const onResize = () => setW(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);
  return {
    width: w,
    isDesktop: w >= 900,
    isTablet: w >= 640 && w < 900,
    isMobile: w < 640,
  };
}

// ═══════════════════════════════════════════════════════════
// APP PRINCIPALE
// ═══════════════════════════════════════════════════════════
function App() {
  const vp = useViewport();

  const loadSession = () => {
    try {
      const raw = localStorage.getItem("transitpro_session");
      if (!raw) return null;
      return JSON.parse(raw);
    } catch { return null; }
  };

  const session = loadSession();

  // Vérifie que localStorage est réellement accessible (mode privé, quota plein, navigateur restrictif...)
  const storageBlocked = (() => {
    try {
      const testKey = "__transitpro_test__";
      localStorage.setItem(testKey, "1");
      localStorage.removeItem(testKey);
      return false;
    } catch { return true; }
  })();

  useEffect(() => {
    if (storageBlocked) return; // n'entre pas dans une boucle de redirection si le stockage est bloqué
    if (!session) window.location.href = "login.html";
  }, []);

  if (storageBlocked) {
    return (
      <div style={{ minHeight: "100vh", background: "#07121F", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, textAlign: "center" }}>
        <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
        <div style={{ color: "#E8A020", fontSize: 16, fontWeight: 800, marginBottom: 8 }}>Stockage local inaccessible</div>
        <div style={{ color: "#94a3b8", fontSize: 13, maxWidth: 380 }}>
          Votre navigateur bloque le stockage local (mode privé, quota plein ou paramètres de confidentialité).
          Passez en navigation normale, videz le cache du site, ou activez la synchronisation cloud puis réessayez.
        </div>
      </div>
    );
  }

  const [isDark, setIsDark] = useState(() => session?.isDark !== false);
  const T = themes[isDark ? "dark" : "light"];
  const [db, setDB] = useState(() => session?.db || null);
  const [binId, setBinId] = useState(() => session?.binId || null);
  const [user, setUser] = useState(() => {
    if (!session?.db || !session?.userId) return null;
    return session.db.users?.find(u => u.id === session.userId) || null;
  });
  const [tab, setTab] = useState(() => {
    if (!session?.db || !session?.userId) return "dashboard";
    const u = session.db.users?.find(u => u.id === session.userId);
    return u?.modules?.[0] || "dashboard";
  });
  const [tick, setTick] = useState("");
  const [lastSync, setLastSync] = useState("");
  const syncTimerRef = useRef(null);
  const dbRef = useRef(db);
  useEffect(() => { dbRef.current = db; }, [db]);

  useEffect(() => {
    const t = setInterval(() => setTick(new Date().toLocaleTimeString("fr-FR")), 1000);
    return () => clearInterval(t);
  }, []);

  useEffect(() => {
    if (!binId) return;

    const runReconcile = () => {
      reconcileCloud(binId, dbRef.current).then(merged => {
        setLastSync(new Date().toLocaleTimeString("fr-FR"));
        // Si la fusion a rapatrié des données d'un autre appareil/caissier, on les applique localement
        if (JSON.stringify(merged) !== JSON.stringify(dbRef.current)) {
          saveLocal(merged);
          setDB(merged);
        }
      }).catch(() => {});
    };

    // Cadence fixe de 5s, indépendante des modifications locales (ne se réinitialise plus à chaque vente)
    syncTimerRef.current = setInterval(runReconcile, 5000);

    // Resynchronise immédiatement quand l'onglet redevient actif (ex: caissier qui revient sur l'app)
    const onVisible = () => { if (document.visibilityState === "visible") runReconcile(); };
    document.addEventListener("visibilitychange", onVisible);

    return () => {
      clearInterval(syncTimerRef.current);
      document.removeEventListener("visibilitychange", onVisible);
    };
  }, [binId]);

  const [saveError, setSaveError] = useState("");

  // Persiste localement (session + backup) sans toucher au cloud — utilisé après chaque modif et après fusion
  const saveLocal = (next) => {
    try {
      const raw = localStorage.getItem("transitpro_session");
      const sess = raw ? JSON.parse(raw) : { db: next, binId, userId: user?.id, isDark };
      localStorage.setItem("transitpro_session", JSON.stringify({ ...sess, db: next }));
      if (!binId) localStorage.setItem("transitpro_db_backup", JSON.stringify(next));
      if (saveError) setSaveError("");
    } catch (e) {
      console.error("Erreur sauvegarde locale:", e);
      if (e && e.name === "QuotaExceededError") {
        setSaveError("⚠️ Stockage local plein — vos modifications ne sont plus sauvegardées ! Réduisez la taille du logo ou activez la synchronisation cloud.");
      } else {
        setSaveError("⚠️ Échec de la sauvegarde locale de vos modifications.");
      }
    }
  };

  const setDBSynced = (updater) => {
    setDB(prev => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      next._meta = { updatedAt: Date.now() }; // horodatage pour arbitrer les conflits de config lors de la fusion
      saveLocal(next);
      // Écriture rapide (sans fusion) pour la réactivité ; la fusion authoritative se fait toutes les 8s et au forceSync
      if (binId) cloudWrite(binId, next).catch(() => {});
      return next;
    });
  };

  const forceSync = async () => {
    if (!binId) return;
    const merged = await reconcileCloud(binId, db).catch(() => null);
    if (merged) {
      setLastSync(new Date().toLocaleTimeString("fr-FR"));
      if (JSON.stringify(merged) !== JSON.stringify(db)) {
        saveLocal(merged);
        setDB(merged);
      }
    }
  };

  const activateCloud = async () => {
    try {
      const id = await cloudCreate(db);
      if (id) {
        setBinId(id);
        const saved = JSON.parse(localStorage.getItem("transitpro_bin") || "{}");
        localStorage.setItem("transitpro_bin", JSON.stringify({ ...saved, id }));
      }
    } catch {}
  };

  const handleLogout = () => {
    try {
      const raw = localStorage.getItem("transitpro_session");
      if (raw) {
        const sess = JSON.parse(raw);
        localStorage.setItem("transitpro_session", JSON.stringify({ ...sess, userId: null }));
      }
    } catch {}
    window.location.href = "login.html";
  };

  if (!db || !user) {
    return (
      <div style={{ minHeight: "100vh", background: "#07121F", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: "#E8A020", fontSize: 40 }}>🚌</div>
      </div>
    );
  }

  const navTabs = ALL_MODULES.filter(m => user.modules.includes(m.id));
  const titles = { dashboard: "Accueil", caisse: "Ma Caisse", vente: "Vente Billet", bagages: "Bagages", colis: "Colis Express", planning: "Planning", recettes: "Recettes", rapports: "Rapports", config: "Configuration" };
  const c = db.compagnie;
  const { isDesktop, isTablet, isMobile } = vp;
  const useSidebar = isDesktop || isTablet;
  const contentMaxWidth = isDesktop ? 1100 : isTablet ? 760 : 430;

  return (
    <div style={{ fontFamily: "'Inter',sans-serif", background: T.bg, minHeight: "100vh", color: T.text }}>
      {saveError && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 9999, background: "#c0392b", color: "#fff", padding: "10px 16px", fontSize: 13, fontWeight: 700, textAlign: "center" }}>
          {saveError}
        </div>
      )}
      <div style={{ display: "flex", maxWidth: useSidebar ? "100%" : 430, margin: "0 auto" }}>

        {/* SIDEBAR */}
        {useSidebar && (
          <nav style={{ width: isDesktop ? 220 : 84, flexShrink: 0, background: T.surface, borderRight: `1px solid ${T.border}`, minHeight: "100vh", position: "sticky", top: 0, display: "flex", flexDirection: "column", padding: "18px 0" }}>
            <div style={{ padding: isDesktop ? "0 18px 18px" : "0 8px 18px", borderBottom: `1px solid ${T.border}`, marginBottom: 10, textAlign: isDesktop ? "left" : "center" }}>
              <div style={{ fontSize: isDesktop ? 19 : 24, fontWeight: 900, color: T.gold }}>{c.logo}{isDesktop ? ` ${c.nom}` : ""}</div>
              {isDesktop && <div style={{ fontSize: 10, color: T.textMuted, marginTop: 2 }}>{c.ville}</div>}
            </div>
            {navTabs.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", justifyContent: isDesktop ? "flex-start" : "center", padding: isDesktop ? "11px 18px" : "12px 4px", border: "none", background: tab === t.id ? `${T.gold}18` : "none", color: tab === t.id ? T.gold : T.textSub, cursor: "pointer", fontSize: isDesktop ? 13 : 9, fontWeight: tab === t.id ? 800 : 600, borderLeft: `3px solid ${tab === t.id ? T.gold : "transparent"}`, flexDirection: isDesktop ? "row" : "column" }}>
                <span style={{ fontSize: isDesktop ? 16 : 18 }}>{t.icon}</span>
                <span>{t.label}</span>
              </button>
            ))}
          </nav>
        )}

        {/* CONTENU */}
        <div style={{ flex: 1, minWidth: 0, paddingBottom: useSidebar ? 0 : 86 }}>
          <div style={{ background: T.surface, padding: useSidebar ? "16px 24px" : "14px 14px 10px", borderBottom: `2px solid ${T.gold}`, position: "sticky", top: 0, zIndex: 50 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", maxWidth: contentMaxWidth, margin: "0 auto" }}>
              <div>
                {!useSidebar && <div style={{ fontSize: 17, fontWeight: 900, color: T.gold }}>{c.logo} {c.nom}</div>}
                <div style={{ fontSize: useSidebar ? 18 : 10, fontWeight: useSidebar ? 800 : 400, color: useSidebar ? T.text : T.textMuted, textTransform: useSidebar ? "none" : "uppercase", letterSpacing: useSidebar ? 0 : 0.8 }}>{titles[tab]}</div>
              </div>
              <div style={{ display: "flex", gap: 7, alignItems: "center" }}>
                <span style={{ fontSize: 10, color: T.textMuted }}>{tick}</span>
                <button onClick={() => setIsDark(d => !d)} style={{ background: T.surfaceLL, border: `1px solid ${T.border}`, borderRadius: 8, padding: "5px 9px", fontSize: 14, cursor: "pointer" }}>{isDark ? "☀️" : "🌙"}</button>
                <ProfileMenu user={user} db={db} setDB={setDBSynced} T={T} binId={binId} lastSync={lastSync} onForceSync={forceSync} onLogout={handleLogout} />
              </div>
            </div>
            <div style={{ fontSize: 11, color: T.textSub, marginTop: 3, maxWidth: contentMaxWidth, margin: "3px auto 0" }}>{user.nom} · {user.role} {binId && <span style={{ color: T.textMuted, fontSize: 9, fontFamily: "monospace" }}>☁️</span>}</div>
          </div>

          <div style={{ paddingTop: 14, maxWidth: contentMaxWidth, margin: "0 auto" }}>
            {tab === "dashboard" && <DashboardSection db={db} T={T} user={user} onNavigate={setTab} />}
            {tab === "caisse"    && <CaisseSection db={db} setDB={setDBSynced} user={user} T={T} />}
            {tab === "vente"     && <VenteSection db={db} setDB={setDBSynced} user={user} T={T} />}
            {tab === "planning"  && <PlanningSection db={db} setDB={setDBSynced} T={T} />}
            {tab === "recettes"  && <RecettesSection db={db} setDB={setDBSynced} T={T} />}
            {tab === "bagages"   && <BagagesSection db={db} setDB={setDBSynced} user={user} T={T} />}
            {tab === "colis"     && <ColisExpressSection db={db} setDB={setDBSynced} user={user} T={T} />}
            {tab === "rapports"  && <RapportsSection db={db} T={T} />}
            {tab === "config"    && <ConfigSection db={db} setDB={setDBSynced} T={T} binId={binId} onActivateCloud={activateCloud} />}
          </div>
        </div>
      </div>

      {/* NAV BAS — Mobile */}
      {!useSidebar && (
        <nav style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: T.surface, borderTop: `1px solid ${T.border}`, display: "flex", zIndex: 100 }}>
          {navTabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ flex: 1, padding: "9px 2px 7px", border: "none", background: "none", color: tab === t.id ? T.gold : T.textMuted, cursor: "pointer", fontSize: 9, fontWeight: tab === t.id ? 700 : 500, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, borderTop: `2px solid ${tab === t.id ? T.gold : "transparent"}` }}>
              <span style={{ fontSize: 18 }}>{t.icon}</span>{t.label}
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js")
        .then(r => console.log("TransitPro SW:", r.scope))
        .catch(e => console.log("SW erreur:", e));
    });
  }
</script>
