function QRPlaceholder({ value, size = 70 }) {
  const hash = value.split("").reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0);
  const cells = 11; const cell = size / cells; const grid = [];
  for (let r = 0; r < cells; r++)
    for (let c2 = 0; c2 < cells; c2++) {
      const isCorner = (r < 3 && c2 < 3) || (r < 3 && c2 > cells - 4) || (r > cells - 4 && c2 < 3);
      const rand = ((hash * (r * 13 + c2 * 7 + 3)) & 0xFF) > 120;
      if (isCorner || rand) grid.push({ r, c: c2 });
    }
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ display: "block" }}>
      <rect width={size} height={size} fill="white" />
      {grid.map((g, i) => <rect key={i} x={g.c * cell} y={g.r * cell} width={cell - 0.5} height={cell - 0.5} fill="#000" />)}
    </svg>
  );
}

function Toast({ msg, type = "success" }) {
  if (!msg) return null;
  const bg = type === "error" ? "#B91C1C" : type === "warn" ? "#C2410C" : "#15803D";
  return (
    <div style={{ position: "fixed", top: 72, left: "50%", transform: "translateX(-50%)", background: bg, color: "#fff", padding: "10px 22px", borderRadius: 12, fontSize: 13, fontWeight: 700, zIndex: 500, whiteSpace: "nowrap", boxShadow: "0 4px 24px #0009" }}>
      {msg}
    </div>
  );
}

function useToast() {
  const [toast, setToast] = useState({ msg: "", type: "success" });
  const show = (msg, type = "success") => { setToast({ msg, type }); setTimeout(() => setToast({ msg: "" }), 2800); };
  return [toast, show];
}

}

}

}

      <div style="text-align:center;border-bottom:3px solid ${primaryColor};padding-bottom:10px;margin-bottom:10px;">

        ${c.email ? `<div style="font-size:9px;color:#777;">✉ ${c.email}</div>` : ""}
        ${c.siteWeb ? `<div style="font-size:9px;color:#777;">🌐 ${c.siteWeb}</div>` : ""}
        ${c.rccm || c.ninea ? `<div style="font-size:8px;color:#999;margin-top:2px;">${c.rccm ? "RCCM: " + c.rccm : ""}${c.rccm && c.ninea ? " · " : ""}${c.ninea ? "NINEA: " + c.ninea : ""}</div>` : ""}
        ${c.agrément ? `<div style="font-size:8px;color:#999;">Agrément: ${c.agrément}</div>` : ""}
      </div>
      <div style="text-align:center;margin-bottom:8px;">
        <div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;">*** ${type === "V" ? "TICKET VOYAGEUR" : "SOUCHE GARE"} ***</div>
        <div style="font-size:24px;font-weight:900;letter-spacing:3px;color:${primaryColor};">${ticket.id}</div>
        <span style="font-size:10px;font-weight:800;padding:3px 12px;border:2px solid ${primaryColor};color:${primaryColor};display:inline-block;margin-top:3px;">✓ PAYÉ</span>
      </div>
      <div style="border-top:2px dashed #ccc;border-bottom:2px dashed #ccc;padding:8px 0;margin:8px 0;">
        <div style="text-align:center;font-size:15px;font-weight:900;margin-bottom:6px;color:#000;">${ticket.route.replace("→","━━►")}</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
          <div><div style="font-size:9px;color:#888;text-transform:uppercase;">Passager</div><div style="font-size:12px;font-weight:700;">${ticket.passager}</div>${ticket.passagerTel ? `<div style="font-size:10px;color:#555;">📞 ${ticket.passagerTel}</div>` : ""}</div>
          <div style="text-align:right;"><div style="font-size:9px;color:#888;text-transform:uppercase;">Date</div><div style="font-size:12px;font-weight:700;">${ticket.date}</div></div>

        <div style="display:flex;justify-content:space-between;">

        <div>
          <div style="font-size:9px;color:#888;text-transform:uppercase;">Prix · ${ticket.paiement}</div>

function PrintModal({ ticket, db, T, onClose }) {
  const ref = useRef();
  const handlePrint = () => {
    const win = window.open("", "_blank", "width=420,height=750");
    win.document.write(`<html><head><title>${ticket.id}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#fff;display:flex;flex-direction:column;align-items:center;padding:10px;}</style></head><body>${ref.current.innerHTML}</body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 400);
  };
  return (
    <Modal title="Aperçu avant impression" onClose={onClose} T={T}>
      <div ref={ref} dangerouslySetInnerHTML={{ __html: buildPrintHTML(ticket, db.compagnie) }} style={{ transform: "scale(0.85)", transformOrigin: "top center" }} />
      <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
        <Btn onClick={handlePrint} color={T.gold} full>🖨️ Imprimer (double ticket)</Btn>
        <Btn onClick={onClose} color={T.textMuted} outline>Fermer</Btn>
      </div>
    </Modal>
  );
}

// SECTION CAISSE
// ═══════════════════════════════════════════════════════════
function CaisseSection({ db, setDB, user, T }) {
  const [toast, show] = useToast();
  const session = db.sessions.find(s => s.caissier === user.nom && s.statut === "OUVERTE");
  const mesVentes = session ? db.ventes.filter(v => v.shiftId === session.id) : [];
  const now = () => new Date().toLocaleString("fr-FR");

  const ouvrir = () => {
    if (session) return;
    const s = { id: Date.now(), caissier: user.nom, ouverture: now(), cloture: null, total: 0, statut: "OUVERTE" };
    setDB(d => ({ ...d, sessions: [...d.sessions, s] }));
    show("✅ Caisse ouverte !");
  };

  const cloturer = () => {
    setDB(d => ({ ...d, sessions: d.sessions.map(s => s.id === session.id ? { ...s, statut: "FERMEE", cloture: now() } : s) }));
    show("Caisse clôturée — en attente de validation admin.");
  };

  return (
    <div style={{ padding: "0 14px" }}>
      <Toast msg={toast.msg} type={toast.type} />
      {!session ? (
        <Card T={T} style={{ textAlign: "center", padding: "36px 20px" }}>
          <div style={{ fontSize: 52, marginBottom: 10 }}>🏦</div>
          <div style={{ fontSize: 16, fontWeight: 800, color: T.text, marginBottom: 6 }}>Caisse fermée</div>
          <div style={{ fontSize: 12, color: T.textSub, marginBottom: 20 }}>Ouvrez votre caisse pour commencer à vendre.</div>
          <Btn onClick={ouvrir} color={T.gold} full>Ouvrir ma caisse</Btn>
        </Card>
      ) : (
        <>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
            {[
              { label: "Statut", val: "OUVERTE", color: T.green },
              { label: "Billet(s) vendus", val: mesVentes.length, color: T.blue },
              { label: "Total session", val: `${session.total.toLocaleString()} F`, color: T.gold },
              { label: "Ouverte à", val: session.ouverture.split(" ")[1] || session.ouverture, color: T.textSub },
            ].map(s => (
              <Card key={s.label} T={T} style={{ padding: "12px 14px" }}>
                <div style={{ fontSize: 10, color: T.textMuted, fontWeight: 700, textTransform: "uppercase" }}>{s.label}</div>
                <div style={{ fontSize: 18, fontWeight: 900, color: s.color, marginTop: 3 }}>{s.val}</div>
              </Card>
            ))}
          </div>
          <Card T={T}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <span style={{ fontSize: 13, fontWeight: 800, color: T.text }}>Historique session</span>
              <Btn onClick={cloturer} color={T.red} outline small>Clôturer la caisse</Btn>
            </div>
            {mesVentes.length === 0 ? (
              <div style={{ textAlign: "center", padding: "20px 0", color: T.textMuted, fontSize: 12 }}>Aucune vente pour l'instant</div>
            ) : mesVentes.slice().reverse().map(v => (
              <div key={v.id} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: `1px solid ${T.border}`, fontSize: 12 }}>
                <div>
                  <span style={{ fontWeight: 700, color: T.text }}>{v.ticketId}</span>
                  <span style={{ color: T.textSub, marginLeft: 8 }}>{v.dest}</span>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontWeight: 700, color: T.gold }}>{v.prix.toLocaleString()} F</div>
                  <div style={{ color: T.textMuted, fontSize: 10 }}>{v.paiement}</div>
                </div>
              </div>
            ))}
          </Card>
        </>
      )}
    </div>
  );
}

  const [printTicket, setPrintTicket] = useState(null);

  const session = db.sessions.find(s => s.caissier === user.nom && s.statut === "OUVERTE");
  const selectedRoute = db.routes.find(r => r.id === parseInt(sel.routeId));
  const selectedPlan = db.planning.find(p => p.id === parseInt(sel.planId));
  const selectedVeh = selectedPlan ? db.vehicules.find(v => v.id === selectedPlan.vehiculeId) : null;
  const prix = selectedRoute && selectedVeh ? (selectedRoute.prix[selectedVeh.type] || 0) : 0;

  // Calcul du prochain siège automatique
  const nextSiege = selectedPlan && selectedVeh
    ? String(selectedPlan.vendu + 1).padStart(2, "0")
    : "—";

  const placesRestantes = selectedPlan && selectedVeh
    ? selectedVeh.capacite - selectedPlan.vendu
    : null;

  const complet = placesRestantes !== null && placesRestantes <= 0;

  const departsDispos = selectedRoute
    ? db.planning.filter(p => {
        const r = db.routes.find(r => r.id === p.routeId);
        const v = db.vehicules.find(v => v.id === p.vehiculeId);
        return r?.id === selectedRoute.id && p.statut === "ATTENTE";
      })
    : [];

  const vendre = () => {
    if (!session) { show("Ouvrez votre caisse d'abord !", "error"); return; }
    if (!sel.routeId || !sel.planId) { show("Choisissez une route et un départ", "error"); return; }
    if (complet) { show("Ce départ est complet !", "error"); return; }
    const now = new Date();
    const date = now.toLocaleDateString("fr-FR");
    const heureEmission = now.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    const id = `${db.ticketPrefix}-${String(db.ticketCounter).padStart(3, "0")}`;
    const siegeAuto = String(selectedPlan.vendu + 1).padStart(2, "0");
    const nomPassager = passagerNom.trim() || `Passager ${db.ticketCounter}`;
    const ticket = {
      id, passager: nomPassager, passagerTel: passagerTel.trim(), route: `${selectedRoute.depart} → ${selectedRoute.arrivee}`,
      vehicule: selectedVeh?.type || "—", heureDep: selectedPlan.heure, siege: siegeAuto,
      prix, paiement: sel.paiement, statut: "Payé", caissier: user.nom, date, heureEmission,
    };
    const vente = { id: Date.now(), ticketId: id, dest: `${selectedRoute.depart} → ${selectedRoute.arrivee}`, depart: selectedRoute.depart, arrivee: selectedRoute.arrivee, prix, paiement: sel.paiement, caissier: user.nom, shiftId: session.id, heure: heureEmission, date, siege: siegeAuto, passager: nomPassager, passagerTel: passagerTel.trim(), planId: selectedPlan.id, vehicule: selectedVeh?.type || "—", immatriculation: selectedVeh?.immatriculation || "—", heureDep: selectedPlan.heure };
    setDB(d => ({
      ...d,
      ticketCounter: d.ticketCounter + 1,
      ventes: [...d.ventes, vente],
      planning: d.planning.map(p => p.id === selectedPlan.id ? { ...p, vendu: p.vendu + 1 } : p),
      sessions: d.sessions.map(s => s.id === session.id ? { ...s, total: s.total + prix } : s),
    }));
    setPrintTicket(ticket);
    setSel({ routeId: "", planId: "", paiement: "Espèces" });
    setPassagerNom("");
    setPassagerTel("");
    show(`✅ Billet ${id} — Siège ${siegeAuto} émis !`);
  };

  if (!session) return (
    <div style={{ padding: "0 14px" }}>
      <Card T={T} style={{ textAlign: "center", padding: "36px 20px" }}>
        <div style={{ fontSize: 48, marginBottom: 10 }}>🔒</div>
        <div style={{ fontSize: 14, fontWeight: 700, color: T.text, marginBottom: 6 }}>Caisse fermée</div>
        <div style={{ fontSize: 12, color: T.textSub }}>Allez dans «Ma Caisse» pour ouvrir votre session.</div>
      </Card>
    </div>
  );

  return (
    <div style={{ padding: "0 14px" }}>
      <Toast msg={toast.msg} type={toast.type} />
      {printTicket && <PrintModal ticket={printTicket} db={db} T={T} onClose={() => setPrintTicket(null)} />}

      <Card T={T} style={{ border: `1px solid ${T.gold}44` }}>
        <div style={{ fontSize: 14, fontWeight: 800, color: T.gold, marginBottom: 14 }}>🎫 Vente de billet</div>

        {/* Infos passager */}
        <div style={{ background: T.surfaceLL, borderRadius: 10, padding: 12, marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: T.textSub, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 10 }}>👤 Informations passager</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <Fld label="Nom complet" T={T}>
              <Inp value={passagerNom} onChange={e => setPassagerNom(e.target.value)} placeholder="Ex: Moussa Diop" T={T} />
            </Fld>
            <Fld label="Téléphone" T={T}>
              <Inp value={passagerTel} onChange={e => setPassagerTel(e.target.value)} placeholder="+221 77…" type="tel" T={T} />
            </Fld>
          </div>
        </div>

        <Fld label="Route" T={T}>
          <Sel value={sel.routeId} onChange={e => setSel({ ...sel, routeId: e.target.value, planId: "" })} T={T}>
            <option value="">— Choisir une route —</option>
            {db.routes.map(r => <option key={r.id} value={r.id}>{r.depart} → {r.arrivee} ({r.duree})</option>)}
          </Sel>
        </Fld>

        {sel.routeId && (
          <Fld label="Départ disponible" T={T}>
            {departsDispos.length === 0
              ? <div style={{ fontSize: 12, color: T.orange, padding: "6px 0" }}>⚠️ Aucun départ programmé sur cette route</div>
              : <Sel value={sel.planId} onChange={e => setSel({ ...sel, planId: e.target.value })} T={T}>
                  <option value="">— Choisir —</option>
                  {departsDispos.map(p => {
                    const v = db.vehicules.find(v => v.id === p.vehiculeId);
                    const libres = (v?.capacite || 0) - p.vendu;
                    const full = libres <= 0;
                    return <option key={p.id} value={p.id} disabled={full}>
                      {p.heure} · {v?.marque} {v?.modele} {full ? "🔴 COMPLET" : `(${libres} pl. libres)`}
                    </option>;
                  })}
                </Sel>
            }
          </Fld>
        )}

        {sel.planId && (
          <>
            {complet ? (
              <div style={{ background: `${T.red}18`, border: `1.5px solid ${T.red}`, borderRadius: 12, padding: "18px 14px", textAlign: "center", marginBottom: 12 }}>
                <div style={{ fontSize: 28, marginBottom: 6 }}>🚫</div>
                <div style={{ fontSize: 14, fontWeight: 800, color: T.red }}>Départ complet</div>
                <div style={{ fontSize: 12, color: T.textSub, marginTop: 4 }}>Toutes les {selectedVeh?.capacite} places sont vendues pour ce départ.</div>
              </div>
            ) : (
              <>
                <div style={{ background: T.surfaceLL, borderRadius: 10, padding: 12, marginBottom: 12 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <div>
                      <div style={{ fontSize: 10, color: T.textMuted, fontWeight: 600 }}>Véhicule</div>
                      <div style={{ fontWeight: 700, color: T.text, fontSize: 13 }}>{selectedVeh?.marque} {selectedVeh?.modele} · {selectedVeh?.immatriculation}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 10, color: T.textMuted, fontWeight: 600 }}>Prix</div>
                      <div style={{ fontSize: 20, fontWeight: 900, color: T.gold }}>{prix.toLocaleString()} F</div>
                    </div>
                  </div>
                  {/* Barre de remplissage */}
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 5 }}>
                    <span style={{ color: T.textMuted }}>Places</span>
                    <span style={{ fontWeight: 700, color: placesRestantes <= 3 ? T.red : placesRestantes <= 8 ? T.orange : T.green }}>
                      {selectedPlan?.vendu}/{selectedVeh?.capacite} · {placesRestantes} restante(s)
                    </span>
                  </div>
                  <div style={{ height: 5, background: T.border, borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ width: `${Math.round((selectedPlan?.vendu / selectedVeh?.capacite) * 100)}%`, height: "100%", background: placesRestantes <= 3 ? T.red : placesRestantes <= 8 ? T.orange : T.green, borderRadius: 4, transition: "width 0.3s" }} />
                  </div>
                </div>

                {/* Siège automatique */}
                <div style={{ background: `${T.gold}18`, border: `1.5px solid ${T.gold}66`, borderRadius: 12, padding: "12px 14px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 10, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>🪑 Siège attribué automatiquement</div>
                    <div style={{ fontSize: 11, color: T.textSub }}>Prochain siège disponible</div>
                  </div>
                  <div style={{ fontSize: 32, fontWeight: 900, color: T.gold, letterSpacing: 2 }}>{nextSiege}</div>
                </div>

                <Fld label="Mode de paiement" T={T}>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                    {PAIEMENTS.map(p => (
                      <button key={p} onClick={() => setSel({ ...sel, paiement: p })}
                        style={{ padding: "7px 12px", borderRadius: 8, border: `1.5px solid ${sel.paiement === p ? T.gold : T.border}`, background: sel.paiement === p ? `${T.gold}22` : T.inputBg, color: sel.paiement === p ? T.gold : T.textSub, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                        {p}
                      </button>
                    ))}
                  </div>
                </Fld>

                <div style={{ background: T.surfaceLL, borderRadius: 10, padding: 12, marginBottom: 14 }}>
                  <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 700, marginBottom: 8, textTransform: "uppercase" }}>Récapitulatif</div>
                  {[["Route", `${selectedRoute?.depart} → ${selectedRoute?.arrivee}`], ["Départ", selectedPlan?.heure], ["Siège", nextSiege], ["Passager", passagerNom || "—"], ["Téléphone", passagerTel || "—"], ["Paiement", sel.paiement]].map(([l, v]) => (
                    <div key={l} style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 5 }}>
                      <span style={{ color: T.textSub }}>{l}</span><span style={{ fontWeight: 700, color: T.text }}>{v}</span>
                    </div>
                  ))}
                  <div style={{ borderTop: `1px solid ${T.border}`, marginTop: 8, paddingTop: 8, display: "flex", justifyContent: "space-between" }}>
                    <span style={{ fontSize: 13, fontWeight: 700 }}>Total</span>
                    <span style={{ fontSize: 20, fontWeight: 900, color: T.gold }}>{prix.toLocaleString()} FCFA</span>
                  </div>
                </div>

                <Btn onClick={vendre} color={T.gold} full>✅ Valider &amp; Imprimer</Btn>
              </>
            )}
          </>
        )}
      </Card>
    </div>
  );
}

// FICHE DÉPART IMPRESSION
// ═══════════════════════════════════════════════════════════
function buildFicheHTML(plan, route, veh, ventes, compagnie) {
  const c = compagnie;
  const primaryColor = c.couleurPrimaire || "#B45309";
  const logoHtml = c.logoUrl
    ? `<img src="${c.logoUrl}" style="width:50px;height:50px;object-fit:contain;" />`
    : `<span style="font-size:28px;">${c.logo}</span>`;

  const ticketsDepart = ventes.filter(v => v.planId === plan.id);
  const totalRecettes = ticketsDepart.reduce((s, v) => s + v.prix, 0);

  const lignes = ticketsDepart.map((v, i) => `
    <tr style="background:${i % 2 === 0 ? "#f8f8f8" : "#fff"};">
      <td style="padding:7px 10px;border-bottom:1px solid #e5e7eb;font-weight:700;color:${primaryColor};font-size:13px;">${v.siege || String(i+1).padStart(2,"0")}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;">${v.ticketId}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;">${v.passager || "—"}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:11px;color:#64748b;">${v.passagerTel || "—"}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;text-align:right;font-weight:700;">${v.prix.toLocaleString()} ${c.devise || "FCFA"}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:11px;color:#64748b;">${v.paiement}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:11px;color:#64748b;">${v.heure || "—"}</td>
    </tr>
  `).join("");

  const vides = veh ? Array.from({ length: Math.max(0, veh.capacite - ticketsDepart.length) }, (_, i) => `
    <tr style="background:${(ticketsDepart.length + i) % 2 === 0 ? "#f8f8f8" : "#fff"};">
      <td style="padding:7px 10px;border-bottom:1px solid #e5e7eb;font-weight:700;color:#94a3b8;font-size:13px;">${String(ticketsDepart.length + i + 1).padStart(2,"0")}</td>
      <td colspan="5" style="padding:7px 10px;border-bottom:1px solid #e5e7eb;font-size:11px;color:#94a3b8;font-style:italic;">— Place libre —</td>
    </tr>
  `).join("") : "";

  return `
    <div style="font-family:Arial,sans-serif;max-width:700px;margin:0 auto;color:#111;">
      <!-- EN-TÊTE -->
      <div style="display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid ${primaryColor};padding-bottom:14px;margin-bottom:16px;">
        <div style="display:flex;align-items:center;gap:12px;">
          ${logoHtml}
          <div>
            <div style="font-size:18px;font-weight:900;color:${primaryColor};">${c.nom.toUpperCase()}</div>
            <div style="font-size:10px;color:#64748b;">${c.adresse}${c.ville ? ", "+c.ville : ""} · ${c.tel}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;">Fiche de départ</div>
          <div style="font-size:22px;font-weight:900;color:${primaryColor};">${plan.heure}</div>
          <div style="font-size:11px;color:#64748b;">Imprimée le ${new Date().toLocaleDateString("fr-FR")} à ${new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"})}</div>
        </div>
      </div>

      <!-- INFO TRAJET -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
        <div style="background:#f1f5f9;border-radius:10px;padding:12px;">
          <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;font-weight:700;margin-bottom:4px;">Trajet</div>
          <div style="font-size:14px;font-weight:800;">${route?.depart || "?"} → ${route?.arrivee || "?"}</div>
          <div style="font-size:11px;color:#64748b;">${route?.duree || ""}</div>
        </div>
        <div style="background:#f1f5f9;border-radius:10px;padding:12px;">
          <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;font-weight:700;margin-bottom:4px;">Véhicule</div>
          <div style="font-size:13px;font-weight:800;">${veh?.marque || "?"} ${veh?.modele || ""}</div>
          <div style="font-size:11px;color:#64748b;">${veh?.immatriculation || ""} · ${veh?.type || ""}</div>
        </div>
        <div style="background:#f1f5f9;border-radius:10px;padding:12px;">
          <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;font-weight:700;margin-bottom:4px;">Chauffeur</div>
          <div style="font-size:13px;font-weight:800;">${veh?.chauffeur || "—"}</div>
          <div style="font-size:11px;color:#64748b;">${ticketsDepart.length}/${veh?.capacite || "?"} places vendues</div>
        </div>
      </div>

      <!-- STATISTIQUES -->
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px;">
        ${[
          ["Passagers", ticketsDepart.length, primaryColor],
          ["Places libres", Math.max(0, (veh?.capacite || 0) - ticketsDepart.length), "#64748b"],
          ["Recettes", totalRecettes.toLocaleString() + " " + (c.devise || "FCFA"), "#15803d"],
          ["Taux", Math.round(ticketsDepart.length / (veh?.capacite || 1) * 100) + "%", ticketsDepart.length >= (veh?.capacite || 1) ? "#dc2626" : "#ea580c"],
        ].map(([l, v, col]) => `
          <div style="background:#fff;border:1px solid #e2e8f0;border-top:3px solid ${col};border-radius:8px;padding:10px;text-align:center;">
            <div style="font-size:9px;color:#94a3b8;text-transform:uppercase;font-weight:700;">${l}</div>
            <div style="font-size:16px;font-weight:900;color:${col};margin-top:3px;">${v}</div>
          </div>
        `).join("")}
      </div>

      <!-- TABLEAU PASSAGERS -->
      <table style="width:100%;border-collapse:collapse;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;font-size:12px;">
        <thead>
          <tr style="background:${primaryColor};color:#fff;">
            <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Siège</th>
            <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">N° Ticket</th>
            <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Passager</th>
            <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Téléphone</th>
            <th style="padding:10px;text-align:right;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Prix</th>
            <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Paiement</th>
            <th style="padding:10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;">Heure émission</th>
          </tr>
        </thead>
        <tbody>
          ${lignes}
          ${vides}
        </tbody>
        <tfoot>
          <tr style="background:#f8fafc;border-top:2px solid ${primaryColor};">
            <td colspan="3" style="padding:10px;font-weight:800;font-size:13px;">TOTAL RECETTES</td>
            <td style="padding:10px;text-align:right;font-weight:900;font-size:15px;color:${primaryColor};">${totalRecettes.toLocaleString()} ${c.devise || "FCFA"}</td>
            <td colspan="2" style="padding:10px;font-size:11px;color:#64748b;">${ticketsDepart.length} billet(s)</td>
          </tr>
        </tfoot>
      </table>

      <!-- SIGNATURE -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:30px;padding-top:20px;border-top:1px dashed #cbd5e1;">
        <div style="text-align:center;">
          <div style="font-size:10px;color:#94a3b8;margin-bottom:30px;">Signature Chauffeur</div>
          <div style="border-top:1px solid #111;padding-top:4px;font-size:10px;color:#64748b;">${veh?.chauffeur || "___________________"}</div>
        </div>
        <div style="text-align:center;">
          <div style="font-size:10px;color:#94a3b8;margin-bottom:30px;">Visa Responsable Gare</div>
          <div style="border-top:1px solid #111;padding-top:4px;font-size:10px;color:#64748b;">___________________</div>
        </div>
      </div>
    </div>
  `;
}

// PLANNING DES DÉPARTS
// ═══════════════════════════════════════════════════════════
function PlanningSection({ db, setDB, T }) {
  const [toast, show] = useToast();
  const [form, setForm] = useState({ routeId: "", vehiculeId: "", heure: "" });
  const [showForm, setShowForm] = useState(false);
  const [ficheDepart, setFicheDepart] = useState(null);

  const programmer = () => {
    if (!form.routeId || !form.vehiculeId || !form.heure) { show("Remplissez tous les champs", "error"); return; }
    const veh = db.vehicules.find(v => v.id === form.vehiculeId);
    if (veh?.statut !== "En service") { show("Ce véhicule n'est pas en service !", "error"); return; }
    setDB(d => ({ ...d, planning: [...d.planning, { id: Date.now(), routeId: parseInt(form.routeId), vehiculeId: form.vehiculeId, heure: form.heure, vendu: 0, statut: "ATTENTE" }] }));
    setForm({ routeId: "", vehiculeId: "", heure: "" });
    setShowForm(false);
    show("✅ Départ programmé !");
  };

  const validerDepart = (id) => {
    setDB(d => ({ ...d, planning: d.planning.map(p => p.id === id ? { ...p, statut: "PARTI" } : p) }));
    show("🚌 Départ validé !");
  };

  const supprimer = (id) => {
    setDB(d => ({ ...d, planning: d.planning.filter(p => p.id !== id) }));
  };

  const imprimerFiche = (plan) => {
    const route = db.routes.find(r => r.id === plan.routeId);
    const veh = db.vehicules.find(v => v.id === plan.vehiculeId);
    const win = window.open("", "_blank", "width=780,height=900");
    const html = buildFicheHTML(plan, route, veh, db.ventes, db.compagnie);
    win.document.write(`<!DOCTYPE html><html><head><title>Fiche départ ${plan.heure}</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{background:#fff;padding:20px;font-family:Arial,sans-serif;}@media print{body{padding:10px;}}</style></head><body>${html}</body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 500);
  };

  return (
    <div style={{ padding: "0 14px" }}>
      <Toast msg={toast.msg} type={toast.type} />

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: T.textSub }}>{db.planning.filter(p => p.statut === "ATTENTE").length} départ(s) en attente</span>
        <Btn onClick={() => setShowForm(s => !s)} color={T.gold} small>+ Programmer</Btn>
      </div>

      {showForm && (
        <Card T={T} style={{ border: `1px dashed ${T.gold}66`, marginBottom: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 800, color: T.gold, marginBottom: 12 }}>Nouveau départ</div>
          <Fld label="Route" T={T}>
            <Sel value={form.routeId} onChange={e => setForm({ ...form, routeId: e.target.value })} T={T}>
              <option value="">— Route —</option>
              {db.routes.map(r => <option key={r.id} value={r.id}>{r.depart} → {r.arrivee}</option>)}
            </Sel>
          </Fld>
          <Fld label="Véhicule" T={T}>
            <Sel value={form.vehiculeId} onChange={e => setForm({ ...form, vehiculeId: e.target.value })} T={T}>
              <option value="">— Véhicule —</option>
              {db.vehicules.filter(v => v.statut === "En service").map(v => <option key={v.id} value={v.id}>{v.marque} {v.modele} · {v.immatriculation} ({v.capacite} pl.)</option>)}
            </Sel>
          </Fld>
          <Fld label="Heure de départ" T={T}>
            <Inp type="time" value={form.heure} onChange={e => setForm({ ...form, heure: e.target.value })} T={T} />
          </Fld>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={programmer} color={T.gold} full>Programmer</Btn>
            <Btn onClick={() => setShowForm(false)} color={T.textMuted} outline>Annuler</Btn>
          </div>
        </Card>
      )}

      {db.planning.length === 0 && (
        <Card T={T} style={{ textAlign: "center", padding: "30px 0" }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>📋</div>
          <div style={{ color: T.textMuted, fontSize: 12 }}>Aucun départ programmé</div>
        </Card>
      )}

      {db.planning.slice().sort((a, b) => a.heure.localeCompare(b.heure)).map(p => {
        const route = db.routes.find(r => r.id === p.routeId);
        const veh = db.vehicules.find(v => v.id === p.vehiculeId);
        const pct = veh ? Math.round(p.vendu / veh.capacite * 100) : 0;
        return (
          <Card key={p.id} T={T} border={p.statut === "ATTENTE" ? T.blue : T.textMuted} style={{ opacity: p.statut === "PARTI" ? 0.55 : 1 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
              <div>
                <div style={{ fontSize: 15, fontWeight: 900, color: T.gold }}>{p.heure}</div>
                <div style={{ fontSize: 13, fontWeight: 700, color: T.text }}>{route?.depart} → {route?.arrivee}</div>
              </div>
              <StatutBadge s={p.statut} />
            </div>
            <div style={{ fontSize: 11, color: T.textSub, marginBottom: 8 }}>
              🚌 {veh?.marque} {veh?.modele} · {veh?.immatriculation} · 👤 {veh?.chauffeur}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 6 }}>
              <span style={{ color: T.textMuted }}>Places vendues</span>
              <span style={{ fontWeight: 700, color: T.text }}>{p.vendu}/{veh?.capacite || "?"} ({pct}%)</span>
            </div>
            <div style={{ height: 5, background: T.border, borderRadius: 4, overflow: "hidden", marginBottom: 10 }}>
              <div style={{ width: `${pct}%`, height: "100%", background: pct >= 100 ? T.red : pct > 70 ? T.orange : T.green, borderRadius: 4 }} />
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {p.statut === "ATTENTE" && (
                <>
                  <Btn onClick={() => imprimerFiche(p)} color={T.blue} small>🖨️ Fiche départ</Btn>
                  <Btn onClick={() => validerDepart(p.id)} color={T.green} small>🚌 Valider départ</Btn>
                </>
              )}
              {p.statut === "PARTI" && <Btn onClick={() => imprimerFiche(p)} color={T.textMuted} outline small>🖨️ Fiche</Btn>}
              <Btn onClick={() => supprimer(p.id)} color={T.red} outline small>🗑</Btn>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

          <div style={{ fontSize: 22, fontWeight: 900, color: T.gold, marginTop: 4 }}>{totalGlobal.toLocaleString()} F</div>

        <Card T={T} style={{ borderTop: `2px solid ${T.blue}` }}>

              <Btn onClick={() => validerSession(s.id)} color={T.purple} small>✅ Valider cette session</Btn>

      <div style={{ fontSize: 12, fontWeight: 800, color: T.textSub, textTransform: "uppercase", letterSpacing: 1, margin: "14px 0 10px" }}>Toutes les ventes</div>

          <div style={{ textAlign: "right" }}>

}

      <Fld label="Immatriculation" T={T}><Inp value={f.immatriculation} onChange={e => s("immatriculation", e.target.value.toUpperCase())} placeholder="DK-0000-AB" T={T} /></Fld>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Fld label="Capacité (sièges)" T={T}><Inp type="number" value={f.capacite} onChange={e => s("capacite", e.target.value)} placeholder="40" T={T} /></Fld>
        <Fld label="Année" T={T}><Inp type="number" value={f.annee} onChange={e => s("annee", e.target.value)} placeholder="2022" T={T} /></Fld>
      </div>
      <Fld label="Kilométrage" T={T}><Inp type="number" value={f.kilometrage} onChange={e => s("kilometrage", e.target.value)} placeholder="128000" T={T} /></Fld>
      <Fld label="Chauffeur assigné" T={T}><Inp value={f.chauffeur} onChange={e => s("chauffeur", e.target.value)} placeholder="Nom du chauffeur" T={T} /></Fld>
      <Fld label="Couleur" T={T}>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <input type="color" value={f.couleur} onChange={e => s("couleur", e.target.value)} style={{ width: 44, height: 36, border: `1px solid ${T.border}`, borderRadius: 8, background: T.inputBg, cursor: "pointer", padding: 2 }} />

    </div>

}

function VehiculesSection({ db, setDB, T }) {
  const [modal, setModal] = useState(null);
  const [toast, show] = useToast();
  const [search, setSearch] = useState("");
  const [filtre, setFiltre] = useState("Tous");

  const save = (form) => {
    if (!form.marque || !form.immatriculation || !form.capacite) { show("Marque, immat. et capacité requis", "error"); return; }
    if (modal.type === "add") {
      setDB(d => ({ ...d, vehicules: [...d.vehicules, { ...form, capacite: parseInt(form.capacite), kilometrage: parseInt(form.kilometrage) || 0, id: `V${String(d.vehicules.length + 1).padStart(3, "0")}` }] }));
      show("✅ Véhicule ajouté !");
    } else {
      setDB(d => ({ ...d, vehicules: d.vehicules.map(v => v.id === modal.veh.id ? { ...form, id: v.id, capacite: parseInt(form.capacite), kilometrage: parseInt(form.kilometrage) || 0 } : v) }));
      show("✅ Mis à jour !");
    }
    setModal(null);
  };

  const del = (id) => { setDB(d => ({ ...d, vehicules: d.vehicules.filter(v => v.id !== id) })); setModal(null); show("🗑 Supprimé"); };

  const liste = db.vehicules.filter(v => (filtre === "Tous" || v.statut === filtre) && (!search || `${v.marque} ${v.modele} ${v.immatriculation} ${v.chauffeur}`.toLowerCase().includes(search.toLowerCase())));
  const stats = { total: db.vehicules.length, service: db.vehicules.filter(v => v.statut === "En service").length, maint: db.vehicules.filter(v => v.statut !== "En service" && v.statut !== "Hors service").length, hs: db.vehicules.filter(v => v.statut === "Hors service").length };

  return (
    <div style={{ padding: "0 14px" }}>
      <Toast msg={toast.msg} type={toast.type} />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 12 }}>
        {[["Total", stats.total, T.gold], ["Service", stats.service, T.green], ["Maint.", stats.maint, T.orange], ["HS", stats.hs, T.red]].map(([l, v, c]) => (
          <div key={l} style={{ background: T.surface, borderRadius: 10, padding: "10px 6px", textAlign: "center", borderTop: `2px solid ${c}`, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 18, fontWeight: 900, color: c }}>{v}</div>
            <div style={{ fontSize: 9, color: T.textMuted, fontWeight: 700, textTransform: "uppercase" }}>{l}</div>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
        <div style={{ flex: 1, position: "relative" }}>
          <span style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)" }}>🔍</span>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Rechercher…"
            style={{ width: "100%", background: T.inputBg, border: `1px solid ${T.border}`, borderRadius: 8, padding: "8px 10px 8px 28px", color: T.text, fontSize: 12, outline: "none", boxSizing: "border-box" }} />
        </div>
        <Btn onClick={() => setModal({ type: "add" })} color={T.gold} small>+ Nouveau</Btn>
      </div>
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 10 }}>
        {["Tous", ...STATUTS_VEH].map(s => (
          <button key={s} onClick={() => setFiltre(s)} style={{ flexShrink: 0, padding: "5px 12px", borderRadius: 20, border: "none", fontSize: 11, fontWeight: 700, cursor: "pointer", background: filtre === s ? T.gold : T.surfaceLL, color: filtre === s ? "#000" : T.textSub }}>{s}</button>
        ))}
      </div>

      {liste.map(v => {
        return (
          <Card key={v.id} T={T} style={{ overflow: "hidden", padding: 0 }}>
            <div style={{ background: `${v.couleur}18`, padding: "12px 14px", borderBottom: `1px solid ${T.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <div style={{ width: 42, height: 42, borderRadius: 10, background: v.couleur, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>
                    {v.type === "Taxi" ? "🚕" : v.type === "Camion" ? "🚛" : "🚌"}
                  </div>
                  <div>
                    <div style={{ fontWeight: 800, fontSize: 14, color: T.text }}>{v.marque} {v.modele}</div>
                    <div style={{ fontSize: 11, color: T.textSub, fontWeight: 600 }}>{v.immatriculation}</div>
                  </div>
                </div>
                <StatutBadge s={v.statut} />
              </div>
            </div>
            <div style={{ padding: "10px 14px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 6, marginBottom: 10 }}>
                {[["Type", v.type], ["Sièges", v.capacite], ["Année", v.annee], ["Km", v.kilometrage ? `${Number(v.kilometrage).toLocaleString()}` : "—"], ["ID", v.id], ["Couleur", <span style={{ display: "inline-block", width: 14, height: 14, borderRadius: "50%", background: v.couleur, verticalAlign: "middle" }} />]].map(([l, val]) => (
                  <div key={l} style={{ background: T.surfaceLL, borderRadius: 8, padding: "6px 8px" }}>
                    <div style={{ fontSize: 9, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginBottom: 2 }}>{l}</div>
                    <div style={{ fontSize: 12, fontWeight: 700, color: T.text }}>{val}</div>
                  </div>
                ))}
              </div>
              <div style={{ background: T.surfaceLL, borderRadius: 8, padding: "8px 10px", display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
                <span>👤</span>
                <div>
                  <div style={{ fontSize: 9, color: T.textMuted, fontWeight: 700, textTransform: "uppercase" }}>Chauffeur</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: T.text }}>{v.chauffeur || "Non assigné"}</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 7 }}>
                <Btn onClick={() => setModal({ type: "view", veh: v })} color={T.blue} outline small>👁 Détails</Btn>
                <Btn onClick={() => setModal({ type: "edit", veh: v })} color={T.gold} outline small>✏️ Modifier</Btn>
                <Btn onClick={() => setModal({ type: "del", veh: v })} color={T.red} outline small>🗑 Suppr.</Btn>
              </div>
            </div>
          </Card>
        );
      })}

      {modal?.type === "add" && <Modal title="➕ Nouveau véhicule" onClose={() => setModal(null)} T={T}><VehiculeForm onSave={save} onCancel={() => setModal(null)} T={T} /></Modal>}
      {modal?.type === "edit" && <Modal title="✏️ Modifier" onClose={() => setModal(null)} T={T}><VehiculeForm initial={modal.veh} onSave={save} onCancel={() => setModal(null)} T={T} /></Modal>}
      {modal?.type === "view" && (
        <Modal title={`${modal.veh.marque} ${modal.veh.modele}`} onClose={() => setModal(null)} T={T}>
          <div style={{ background: `${modal.veh.couleur}18`, borderRadius: 12, padding: 14, marginBottom: 14, display: "flex", gap: 14, alignItems: "center" }}>
            <div style={{ width: 54, height: 54, borderRadius: 14, background: modal.veh.couleur, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>{modal.veh.type === "Taxi" ? "🚕" : "🚌"}</div>
            <div><div style={{ fontSize: 16, fontWeight: 900, color: T.text }}>{modal.veh.marque} {modal.veh.modele}</div><div style={{ fontSize: 12, color: T.textSub }}>{modal.veh.immatriculation}</div><StatutBadge s={modal.veh.statut} /></div>
          </div>
          {[["ID", modal.veh.id], ["Type", modal.veh.type], ["Marque", modal.veh.marque], ["Modèle", modal.veh.modele], ["Immatriculation", modal.veh.immatriculation], ["Capacité", `${modal.veh.capacite} sièges`], ["Année", modal.veh.annee], ["Kilométrage", modal.veh.kilometrage ? `${Number(modal.veh.kilometrage).toLocaleString()} km` : "—"], ["Chauffeur", modal.veh.chauffeur || "Non assigné"], ["Statut", modal.veh.statut]].map(([l, v]) => (
            <div key={l} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: `1px solid ${T.border}`, fontSize: 12 }}>
              <span style={{ color: T.textSub }}>{l}</span><span style={{ fontWeight: 700, color: T.text }}>{v}</span>
            </div>
          ))}
          <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
            <Btn onClick={() => setModal({ type: "edit", veh: modal.veh })} color={T.gold} full>✏️ Modifier</Btn>
            <Btn onClick={() => setModal(null)} color={T.textMuted} outline>Fermer</Btn>
          </div>
        </Modal>
      )}
      {modal?.type === "del" && (
        <Modal title="Confirmer la suppression" onClose={() => setModal(null)} T={T}>
          <div style={{ textAlign: "center", padding: "10px 0 20px" }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>⚠️</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: T.text, marginBottom: 6 }}>{modal.veh.marque} {modal.veh.modele}</div>
            <div style={{ fontSize: 12, color: T.textSub, marginBottom: 20 }}>Cette action est irréversible.</div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn onClick={() => del(modal.veh.id)} color={T.red} full>Supprimer</Btn>
              <Btn onClick={() => setModal(null)} color={T.textMuted} outline>Annuler</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// CONFIGURATION COMPLÈTE
// ═══════════════════════════════════════════════════════════
function ConfigSection({ db, setDB, T, binId, onActivateCloud }) {
  const [sec, setSec] = useState("vehicules");
  const [toast, show] = useToast();
  const [editCo, setEditCo] = useState({ ...db.compagnie });
  const [newRoute, setNewRoute] = useState({ depart: "", arrivee: "", duree: "" });
  const [editRoute, setEditRoute] = useState(null);
  const [newUser, setNewUser] = useState({ nom: "", login: "", pin: "", role: "caissier", modules: ["caisse", "vente", "planning"] });
  const [editUser, setEditUser] = useState(null);
  const [apiKey, setApiKey] = useState(getJsonbinKey());
  const [keySaved, setKeySaved] = useState(false);

  const tabs = [
    { id: "vehicules", label: "🚌 Véhicules" }, { id: "compagnie", label: "🏢 Compagnie" },
    { id: "routes", label: "🗺️ Routes" }, { id: "tickets", label: "🎫 Tickets" }, { id: "users", label: "👤 Utilisateurs" },
    { id: "sync", label: "☁️ Synchronisation" },
  ];

  const saveUser = (form) => {
    if (!form.nom || !form.login || form.pin.length !== 4) { show("Nom, login et PIN 4 chiffres requis", "error"); return; }
    if (editUser) {
      setDB(d => ({ ...d, users: d.users.map(u => u.id === editUser.id ? { ...u, ...form } : u) }));
      show("✅ Utilisateur mis à jour !");
      setEditUser(null);
    } else {
      if (db.users.find(u => u.login === form.login)) { show("Ce login existe déjà", "error"); return; }
      setDB(d => ({ ...d, users: [...d.users, { ...form, id: `U${String(d.users.length + 1).padStart(3, "0")}` }] }));
      show("✅ Utilisateur créé !");
    }
    setNewUser({ nom: "", login: "", pin: "", role: "caissier", modules: ["caisse", "vente", "planning"] });
  };

  const userForm = editUser || newUser;
  const setUF = (k, v) => editUser ? setEditUser(u => ({ ...u, [k]: v })) : setNewUser(u => ({ ...u, [k]: v }));
  const toggleMod = (id) => {
    const mods = userForm.modules.includes(id) ? userForm.modules.filter(m => m !== id) : [...userForm.modules, id];
    setUF("modules", mods);
  };

  return (
    <div>
      <Toast msg={toast.msg} type={toast.type} />
      <div style={{ display: "flex", gap: 6, overflowX: "auto", padding: "0 14px 12px", borderBottom: `1px solid ${T.border}` }}>
        {tabs.map(t => <button key={t.id} onClick={() => setSec(t.id)} style={{ flexShrink: 0, padding: "7px 12px", borderRadius: 20, border: "none", fontSize: 11, fontWeight: 700, cursor: "pointer", background: sec === t.id ? T.gold : T.surfaceLL, color: sec === t.id ? "#000" : T.textSub }}>{t.label}</button>)}
      </div>

      <div style={{ paddingTop: 14 }}>
        {sec === "vehicules" && <VehiculesSection db={db} setDB={setDB} T={T} />}

        {sec === "compagnie" && (

                        let { width, height } = img;
                        if (width > height) { if (width > maxSize) { height *= maxSize / width; width = maxSize; } }

                        const canvas = document.createElement("canvas");
                        canvas.width = width; canvas.height = height;

                try {
                  const dateStr = new Date().toISOString().slice(0, 10);
                  const nomFichier = `transitpro_${(db.compagnie?.nom || "export").replace(/[^a-z0-9]+/gi, "_").toLowerCase()}_${dateStr}.json`;
                  const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
                  const url = URL.createObjectURL(blob);
                  const a = document.createElement("a");
                  a.href = url; a.download = nomFichier;
                  document.body.appendChild(a); a.click(); document.body.removeChild(a);
                  URL.revokeObjectURL(url);
                  show("✅ Export téléchargé !");
                } catch (e) { show("❌ Échec de l'export : " + e.message, "error"); }
              }} color={T.gold} full>⬇️ Exporter mes données (JSON)</Btn>
            </Card>
          </div>
        )}
      </div>
    </div>
  );
}

        <div style="font-size:9px;color:#555;font-style:italic;">${c.slogan}</div>
        <div style="font-size:9px;color:#777;margin-top:3px;">${c.adresse}${c.ville ? ", " + c.ville : ""}</div>

      <div style="text-align:center;margin-bottom:10px;">
        <div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;">*** ${type === "P" ? "REÇU PASSAGER" : "SOUCHE BAGAGISTE"} ***</div>
        <div style="font-size:26px;font-weight:900;letter-spacing:3px;color:${primaryColor};margin:4px 0;">${enreg.id}</div>
        <span style="font-size:10px;font-weight:800;padding:3px 14px;border:2px solid ${primaryColor};color:${primaryColor};display:inline-block;">🧳 BAGAGE ENREGISTRÉ</span>
      </div>
      <div style="border-top:2px dashed #ccc;border-bottom:2px dashed #ccc;padding:8px 0;margin:8px 0;">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
          <div><div style="font-size:9px;color:#888;text-transform:uppercase;">Passager</div><div style="font-size:12px;font-weight:700;">${enreg.passagerNom}</div>${enreg.passagerTel ? `<div style="font-size:10px;color:#555;">📞 ${enreg.passagerTel}</div>` : ""}</div>
          <div style="text-align:right;"><div style="font-size:9px;color:#888;text-transform:uppercase;">Date</div><div style="font-size:12px;font-weight:700;">${enreg.date}</div></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
          <div><div style="font-size:9px;color:#888;text-transform:uppercase;">Route</div><div style="font-size:12px;font-weight:700;">${enreg.route}</div></div>
          <div style="text-align:right;"><div style="font-size:9px;color:#888;text-transform:uppercase;">Départ</div><div style="font-size:13px;font-weight:900;color:${primaryColor};">${enreg.heureDep || "—"}</div></div>
        </div>
        <div style="margin-bottom:5px;"><div style="font-size:9px;color:#888;text-transform:uppercase;">Bagagiste</div><div style="font-size:12px;font-weight:700;">👤 ${enreg.bagagiste}</div></div>
        ${enreg.ticketRef ? `<div style="font-size:9px;color:#888;">Réf. Billet: <strong>${enreg.ticketRef}</strong></div>` : ""}
      </div>
      <div style="margin:8px 0;">
        <div style="font-size:9px;color:#888;text-transform:uppercase;margin-bottom:6px;font-weight:700;">Détail des bagages (${enreg.totalPieces} pièce(s))</div>
        ${tarifBlock}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;background:#f8f8f8;border-radius:6px;padding:8px 10px;margin:8px 0;">

function BagageReceiptModal({ enreg, db, T, onClose }) {
  const ref = useRef();
  const handlePrint = () => {
    const win = window.open("", "_blank", "width=420,height=820");
    win.document.write(`<html><head><title>${enreg.id}</title><style>*{margin:0;padding:0;box-sizing:border-box;}body{background:#fff;display:flex;flex-direction:column;align-items:center;padding:10px;}</style></head><body>${ref.current.innerHTML}</body></html>`);
    win.document.close();
    setTimeout(() => win.print(), 400);
  };
  return (
    <Modal title="🧳 Reçu bagage" onClose={onClose} T={T}>
      <div ref={ref} dangerouslySetInnerHTML={{ __html: buildBagageReceiptHTML(enreg, db.compagnie) }} style={{ transform: "scale(0.82)", transformOrigin: "top center" }} />
      <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
        <Btn onClick={handlePrint} color="#0891B2" full>🖨️ Imprimer (double reçu)</Btn>
        <Btn onClick={onClose} color={T.textMuted} outline>Fermer</Btn>
      </div>
    </Modal>
  );
}

function BagagesSection({ db, setDB, user, T }) {
  const [toast, show] = useToast();
  const [vue, setVue] = useState("enregistrer"); // enregistrer | historique | tarifs
  const [printEnreg, setPrintEnreg] = useState(null);
  const CYAN = "#0891B2";

  // ── Formulaire enregistrement ──
  const emptyForm = { passagerNom: "", passagerTel: "", ticketRef: "", route: "", heureDep: "", paiement: "Espèces", articles: [] };
  const [form, setForm] = useState(emptyForm);
  const [newArticle, setNewArticle] = useState({ type: "Valise", taille: "Moyen", qte: 1, prixUnit: 0, description: "" });
  const [ticketSearch, setTicketSearch] = useState("");
  const [ticketFound, setTicketFound] = useState(null);
  const [ticketError, setTicketError] = useState("");

  // ── Recherche ticket par ID ──
  const rechercherTicket = (id) => {
    const q = id.trim().toUpperCase();
    setTicketSearch(q);
    setTicketError("");
    setTicketFound(null);
    if (!q) return;
    const vente = db.ventes.find(v => v.ticketId && v.ticketId.toUpperCase() === q);
    if (vente) {
      setTicketFound(vente);
      setForm(f => ({
        ...f,
        passagerNom: vente.passager || "",
        passagerTel: vente.passagerTel || "",
        ticketRef: vente.ticketId,
        route: vente.dest || "",
        heureDep: vente.heureDep || "",
      }));
      show("✅ Passager trouvé — informations chargées !");
    } else if (q.length >= 3) {
      setTicketError("Ticket introuvable. Vérifiez l'ID ou saisissez les infos manuellement.");
    }
  };

  // ── Tarif auto selon taille ──
  const getTarifAuto = (taille) => {
    const t = db.tarifsBagage?.find(t => t.taille === taille);
    return t ? t.prixBase : 0;
  };

  const handleTailleChange = (taille) => {
    setNewArticle(a => ({ ...a, taille, prixUnit: getTarifAuto(taille) }));
  };

  const addArticle = () => {
    if (!newArticle.qte || newArticle.qte < 1) { show("Quantité invalide", "error"); return; }
    setForm(f => ({ ...f, articles: [...f.articles, { ...newArticle, id: Date.now() }] }));
    setNewArticle({ type: "Valise", taille: "Moyen", qte: 1, prixUnit: getTarifAuto("Moyen"), description: "" });
  };

  const removeArticle = (id) => setForm(f => ({ ...f, articles: f.articles.filter(a => a.id !== id) }));

  const totalPrix = form.articles.reduce((s, a) => s + a.qte * a.prixUnit, 0);
  const totalPieces = form.articles.reduce((s, a) => s + Number(a.qte), 0);

  const enregistrer = () => {
    if (!form.passagerNom.trim()) { show("Nom du passager requis", "error"); return; }
    if (!form.route.trim()) { show("Route requise", "error"); return; }
    if (form.articles.length === 0) { show("Ajoutez au moins un bagage", "error"); return; }
    const now = new Date();
    const date = now.toLocaleDateString("fr-FR");
    const heureEmission = now.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
    const id = `${db.bagagePrefix || "BG"}-${String(db.bagageCounter || 1).padStart(3, "0")}`;
    const enreg = {
      id,
      passagerNom: form.passagerNom.trim(),
      passagerTel: form.passagerTel.trim(),
      ticketRef: form.ticketRef.trim(),
      route: form.route.trim(),
      heureDep: form.heureDep,
      paiement: form.paiement,
      articles: form.articles,
      totalPrix,
      totalPieces,
      bagagiste: user.nom,
      date,
      heureEmission,
    };
    setDB(d => ({
      ...d,
      bagageCounter: (d.bagageCounter || 1) + 1,
      bagages: [...(d.bagages || []), enreg],
    }));
    setPrintEnreg(enreg);
    setForm(emptyForm);
    setTicketSearch("");
    setTicketFound(null);
    setTicketError("");
    show(`✅ Bagage ${id} enregistré !`);
  };

  // ── Statistiques ──
  const bagages = db.bagages || [];
  const totalBagagesRecettes = bagages.reduce((s, b) => s + b.totalPrix, 0);
  const totalBagagesPieces = bagages.reduce((s, b) => s + b.totalPieces, 0);

  // ── Recherche historique ──
  const [search, setSearch] = useState("");
  const histoFiltré = bagages.filter(b =>
    !search || `${b.id} ${b.passagerNom} ${b.passagerTel} ${b.route} ${b.bagagiste}`.toLowerCase().includes(search.toLowerCase())
  ).slice().reverse();

  return (
    <div style={{ padding: "0 14px" }}>
      <Toast msg={toast.msg} type={toast.type} />
      {printEnreg && <BagageReceiptModal enreg={printEnreg} db={db} T={T} onClose={() => setPrintEnreg(null)} />}

      {/* KPI */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 14 }}>
        {[
          { l: "Enregistrements", v: bagages.length, c: CYAN },
          { l: "Pièces totales", v: totalBagagesPieces, c: T.blue },
          { l: "Recettes", v: `${totalBagagesRecettes.toLocaleString()} F`, c: T.gold },
        ].map(s => (
          <div key={s.l} style={{ background: T.surface, borderRadius: 12, padding: "10px 8px", textAlign: "center", borderTop: `2px solid ${s.c}`, border: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 15, fontWeight: 900, color: s.c }}>{s.v}</div>
            <div style={{ fontSize: 8, color: T.textMuted, fontWeight: 700, textTransform: "uppercase", marginTop: 2 }}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* TABS */}
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        {[["enregistrer","🧳 Enregistrer"], ["historique","📋 Historique"], ["tarifs","💰 Tarifs"]].map(([id, label]) => (
          <button key={id} onClick={() => setVue(id)}
            style={{ flex: 1, padding: "8px 4px", borderRadius: 10, border: "none", fontSize: 10, fontWeight: 700, cursor: "pointer", background: vue === id ? CYAN : T.surfaceLL, color: vue === id ? "#fff" : T.textSub }}>
            {label}
          </button>
        ))}
      </div>

      {/* ── ENREGISTREMENT ── */}
      {vue === "enregistrer" && (
        <div>
          {/* Recherche ticket */}
          <Card T={T} style={{ border: `2px solid ${CYAN}66`, marginBottom: 12 }}>
            <div style={{ fontSize: 13, fontWeight: 800, color: CYAN, marginBottom: 10 }}>🎫 Lier à un billet passager</div>
            <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 10 }}>Entrez l'ID du ticket pour charger automatiquement les informations du passager.</div>
            <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
              <div style={{ flex: 1 }}>
                <Inp
                  value={ticketSearch}
                  onChange={e => rechercherTicket(e.target.value)}
                  placeholder="Ex: TP-001"
                  T={T}
                />
              </div>
              <button onClick={() => { setTicketSearch(""); setTicketFound(null); setTicketError(""); setForm(f=>({...f,ticketRef:""})); }}
                style={{ background: `${T.red}18`, color: T.red, border: "none", borderRadius: 8, padding: "0 12px", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>✕</button>
            </div>
            {ticketFound && (
              <div style={{ background: `${CYAN}18`, border: `1px solid ${CYAN}44`, borderRadius: 10, padding: "10px 12px" }}>
                <div style={{ fontSize: 10, color: CYAN, fontWeight: 800, textTransform: "uppercase", marginBottom: 6 }}>✅ Billet trouvé</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                  {[
                    ["N° Ticket", ticketFound.ticketId],
                    ["Passager", ticketFound.passager],
                    ["Téléphone", ticketFound.passagerTel || "—"],
                    ["Route", ticketFound.dest],
                    ["Départ", ticketFound.heureDep || "—"],
                    ["Siège", ticketFound.siege || "—"],

                    <div key={l}>
                      <div style={{ fontSize: 9, color: T.textMuted, fontWeight: 700, textTransform: "uppercase" }}>{l}</div>
                      <div style={{ fontSize: 12, fontWeight: 700, color: T.text }}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {ticketError && (
              <div style={{ background: `${T.red}18`, border: `1px solid ${T.red}44`, borderRadius: 8, padding: "8px 12px", fontSize: 11, color: T.red, fontWeight: 600 }}>
                ⚠️ {ticketError}

          {/* Passager */}
          <Card T={T} style={{ border: `1px solid ${CYAN}44`, marginBottom: 12 }}>

              <Fld label="Heure départ" T={T}>

            <div style={{ fontSize: 13, fontWeight: 800, color: CYAN, marginBottom: 12 }}>📦 Ajouter un bagage</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <Fld label="Type" T={T}>
                <Sel value={newArticle.type} onChange={e => setNewArticle(a => ({ ...a, type: e.target.value }))} T={T}>
                  {TYPES_BAGAGE.map(t => <option key={t}>{t}</option>)}
                </Sel>
              </Fld>
              <Fld label="Taille" T={T}>
                <Sel value={newArticle.taille} onChange={e => handleTailleChange(e.target.value)} T={T}>
                  {TAILLES_BAGAGE.map(t => <option key={t}>{t}</option>)}

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>

                      {t.nom}: {t.prixBase.toLocaleString()} F
                    </button>

            <div style={{ display: "flex", gap: 10, alignItems: "center", background: `${CYAN}11`, borderRadius: 8, padding: "8px 12px", marginBottom: 10 }}>

                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontWeight: 800, color: CYAN, fontSize: 13 }}>{(a.qte * a.prixUnit).toLocaleString()} F</span>
                    <button onClick={() => removeArticle(a.id)} style={{ background: `${T.red}18`, border: "none", color: T.red, borderRadius: 6, width: 26, height: 26, fontSize: 12, cursor: "pointer", fontWeight: 700 }}>✕</button>
                  </div>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 0 0", marginTop: 4 }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: T.text }}>Total</span>
                <span style={{ fontSize: 20, fontWeight: 900, color: CYAN }}>{totalPrix.toLocaleString()} {db.compagnie.devise || "FCFA"}</span>
              </div>

          )}

          {/* Paiement & validation */}
          {form.articles.length > 0 && (

function TarifBagageEditor({ tarif, db, setDB, T, CYAN, show }) {
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({ ...tarif });
  const save = () => {
    if (!form.nom || !form.prixBase) { show("Nom et prix requis", "error"); return; }
    setDB(d => ({ ...d, tarifsBagage: d.tarifsBagage.map(t => t.id === tarif.id ? { ...form, prixBase: parseInt(form.prixBase) || 0 } : t) }));
    show("✅ Tarif mis à jour !"); setEditing(false);
  };
  return (
    <Card T={T} border={CYAN} style={{ marginBottom: 10 }}>
      {editing ? (
        <div>
          <Fld label="Nom du tarif" T={T}><Inp value={form.nom} onChange={e => setForm(f => ({ ...f, nom: e.target.value }))} T={T} /></Fld>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <Fld label="Taille" T={T}>
              <Sel value={form.taille} onChange={e => setForm(f => ({ ...f, taille: e.target.value }))} T={T}>
                {TAILLES_BAGAGE.map(t => <option key={t}>{t}</option>)}
              </Sel>
            </Fld>
            <Fld label="Prix de base (F)" T={T}><Inp type="number" value={form.prixBase} onChange={e => setForm(f => ({ ...f, prixBase: e.target.value }))} T={T} /></Fld>
          </div>
          <Fld label="Description" T={T}><Inp value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} T={T} /></Fld>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={save} color={CYAN} full>Enregistrer</Btn>
            <Btn onClick={() => setEditing(false)} color={T.textMuted} outline>Annuler</Btn>
          </div>
        </div>
      ) : (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
            <div>
              <div style={{ fontWeight: 800, fontSize: 13, color: T.text }}>{tarif.nom}</div>
              <div style={{ fontSize: 10, color: T.textMuted }}>{tarif.taille} · {tarif.description}</div>
            </div>
            <div style={{ fontSize: 18, fontWeight: 900, color: CYAN }}>{tarif.prixBase.toLocaleString()} F</div>
          </div>
          <div style={{ display: "flex", gap: 7 }}>
            <Btn onClick={() => setEditing(true)} color={CYAN} outline small>✏️ Modifier</Btn>
            <Btn onClick={() => { setDB(d => ({ ...d, tarifsBagage: d.tarifsBagage.filter(t => t.id !== tarif.id) })); show("🗑 Tarif supprimé"); }} color={T.red} outline small>🗑</Btn>
          </div>
        </div>
      )}
    </Card>
  );
}

function NouveauTarifForm({ db, setDB, T, CYAN, show }) {
  const [form, setForm] = useState({ nom: "", taille: "Moyen", prixBase: "", description: "" });
  const save = () => {
    if (!form.nom || !form.prixBase) { show("Nom et prix requis", "error"); return; }
    setDB(d => ({ ...d, tarifsBagage: [...(d.tarifsBagage || []), { ...form, id: Date.now(), prixBase: parseInt(form.prixBase) || 0 }] }));
    setForm({ nom: "", taille: "Moyen", prixBase: "", description: "" });
    show("✅ Nouveau tarif ajouté !");
  };
  return (
    <Card T={T} style={{ border: `1px dashed ${CYAN}66` }}>
      <div style={{ fontSize: 13, fontWeight: 800, color: CYAN, marginBottom: 12 }}>+ Nouveau tarif</div>
      <Fld label="Nom" T={T}><Inp value={form.nom} onChange={e => setForm(f => ({ ...f, nom: e.target.value }))} placeholder="Ex: Colis fragile" T={T} /></Fld>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        <Fld label="Taille" T={T}>
          <Sel value={form.taille} onChange={e => setForm(f => ({ ...f, taille: e.target.value }))} T={T}>
            {TAILLES_BAGAGE.map(t => <option key={t}>{t}</option>)}
          </Sel>
        </Fld>
        <Fld label="Prix (F)" T={T}><Inp type="number" value={form.prixBase} onChange={e => setForm(f => ({ ...f, prixBase: e.target.value }))} placeholder="1500" T={T} /></Fld>
      </div>
      <Fld label="Description" T={T}><Inp value={form.description} onChange={e => setForm(f => ({ ...f, description: e.target.value }))} placeholder="Détail du tarif" T={T} /></Fld>
      <Btn onClick={save} color={CYAN} full>Ajouter ce tarif</Btn>
    </Card>
  );
}

const STATUTS_COLIS = ["En attente", "Pris en charge", "En transit", "Livré", "Retourné"];
const CYAN_COLIS = "#7C3AED";

function buildColisReceiptHTML(colis, compagnie) {
  const c = compagnie;
  const color = CYAN_COLIS;
  const logoHtml = c.logoUrl
    ? `<img src="${c.logoUrl}" style="width:64px;height:64px;object-fit:contain;margin-bottom:4px;border-radius:8px;" />`
    : `<div style="font-size:32px;margin-bottom:4px;">${c.logo}</div>`;

  const block = (type) => `
    <div style="font-family:'Courier New',monospace;width:310px;margin:0 auto;padding:14px;border:2px solid #ccc;border-radius:8px;color:#000;background:#fff;">
      <div style="text-align:center;border-bottom:3px solid ${color};padding-bottom:10px;margin-bottom:10px;">
        ${logoHtml}
        <div style="font-size:16px;font-weight:900;letter-spacing:1px;color:${color};">${c.nom.toUpperCase()}</div>
        <div style="font-size:9px;color:#555;font-style:italic;">${c.slogan}</div>
        <div style="font-size:9px;color:#777;margin-top:3px;">${c.adresse}${c.ville ? ", " + c.ville : ""}</div>
        <div style="font-size:9px;color:#777;">📞 ${c.tel}</div>
      </div>
      <div style="text-align:center;margin-bottom:10px;">
        <div style="font-size:9px;color:#888;text-transform:uppercase;letter-spacing:1px;">*** ${type === "E" ? "REÇU EXPÉDITEUR" : "BON DE LIVRAISON"} ***</div>
        <div style="font-size:24px;font-weight:900;letter-spacing:3px;color:${color};margin:4px 0;">${colis.id}</div>
        <span style="font-size:10px;font-weight:800;padding:3px 14px;border:2px solid ${color};color:${color};display:inline-block;">📦 COLIS EXPRESS</span>
      </div>
      <div style="border-top:2px dashed #ccc;border-bottom:2px dashed #ccc;padding:8px 0;margin:8px 0;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;">
          <div><div style="font-size:9px;color:#888;text-transform:uppercase;">Expéditeur</div><div style="font-size:11px;font-weight:700;">${colis.expediteurNom}</div>${colis.expediteurTel ? `<div style="font-size:10px;color:#555;">📞 ${colis.expediteurTel}</div>` : ""}</div>
          <div><div style="font-size:9px;color:#888;text-transform:uppercase;">Destinataire</div><div style="font-size:11px;font-weight:700;">${colis.destinataireNom}</div>${colis.destinataireTel ? `<div style="font-size:10px;color:#555;">📞 ${colis.destinataireTel}</div>` : ""}</div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;">
          <div><div style="font-size:9px;color:#888;text-transform:uppercase;">Origine</div><div style="font-size:12px;font-weight:800;">${colis.origine}</div></div>
          <div style="font-size:14px;color:#888;padding-top:8px;">━►</div>
          <div style="text-align:right;"><div style="font-size:9px;color:#888;text-transform:uppercase;">Destination</div><div style="font-size:12px;font-weight:800;">${colis.destination}</div></div>
        </div>
        ${colis.description ? `<div style="margin-top:5px;"><div style="font-size:9px;color:#888;text-transform:uppercase;">Description</div><div style="font-size:11px;">${colis.description}</div></div>` : ""}
        ${colis.poids ? `<div style="margin-top:4px;"><div style="font-size:9px;color:#888;text-transform:uppercase;">Poids / Volume</div><div style="font-size:11px;font-weight:700;">${colis.poids}</div></div>` : ""}
        ${colis.fragile ? `<div style="margin-top:6px;text-align:center;font-size:11px;font-weight:800;color:#DC2626;border:1.5px solid #DC2626;border-radius:6px;padding:3px 0;">⚠️ FRAGILE — MANIPULER AVEC SOIN</div>` : ""}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;background:#f8f8f8;border-radius:6px;padding:8px 10px;margin:8px 0;">
        <div>
          <div style="font-size:9px;color:#888;text-transform:uppercase;">Tarif · ${colis.paiement}</div>
          <div style="font-size:20px;font-weight:900;color:${color};">${colis.prix.toLocaleString()} <span style="font-size:11px;">${c.devise || "FCFA"}</span></div>
        </div>
        ${type === "E" ? `<img src="https://api.qrserver.com/v1/create-qr-code/?size=65x65&data=${colis.id}" width="65" style="border-radius:4px;" />` : ""}
      </div>
      <div style="border-top:2px dashed #ccc;padding-top:6px;margin-top:6px;font-size:9px;color:#888;text-align:center;">

    </div>`;
  return block("E") + `<div style="margin:12px auto;width:310px;text-align:center;border-top:2px dashed #ccc;font-size:10px;padding-top:6px;">✂ ─ ─ ─ COUPER ICI ─ ─ ─ ✂</div>` + block("L");
